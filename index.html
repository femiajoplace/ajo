        function generateNextMemberId() {
            const currentYear = new Date().getFullYear();
            const prefix = `FAJ-${currentYear}-`;
            const yearClients = state.clients.filter(c => c.displayId && c.displayId.startsWith(prefix));
            let nextNum = 1;
            if (yearClients.length > 0) {
                const serials = yearClients.map(c => {
                    const parts = c.displayId.split('-');
                    const num = parseInt(parts[parts.length - 1], 10);
                    return isNaN(num) ? 0 : num;
                });
                nextNum = Math.max(...serials) + 1;
            }
            const paddedSerial = nextNum.toString().padStart(4, '0');
            return `${prefix}${paddedSerial}`;
        }

        function validatePasswordPolicy(password) {
            if (password.length < 8 || password.length > 32) {
                throw new Error("Password must be between 8 and 32 characters.");
            }
            if (!/[A-Z]/.test(password)) {
                throw new Error("Password must contain at least one uppercase letter.");
            }
            if (!/[a-z]/.test(password)) {
                throw new Error("Password must contain at least one lowercase letter.");
            }
            if (!/\d/.test(password)) {
                throw new Error("Password must contain at least one number.");
            }
            if (!/[!@#$%^&*(),.?":{}|<>]/.test(password)) {
                throw new Error("Password must contain at least one special character.");
            }
            return true;
        }

        // --- CORE LOGIC ---
        async function initApp() {
            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);

                const customToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
                
                try {
                    if (customToken) {
                        await signInWithCustomToken(auth, customToken);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (authErr) {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, async (user) => {
                    state.user = user;
                    if (user) {
                        await bootstrapAdmin();
                        setupRealtimeListeners();
                        await checkPersistentSession(user);
                    } else {
                        state.isCheckingSession = false;
                        render();
                    }
                });

                emailjs.init(EMAILJS_PUBLIC_KEY);
            } catch (err) {
                console.error("Critical Connection Error:", err);
                state.view = 'landing';
                state.error = "Ledger Connection Failed.";
                render();
            }
        }

        async function bootstrapAdmin() {
            if (!state.user) return;
            const adminDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'admin_access');
            const snap = await getDoc(adminDocRef);
            if (!snap.exists()) {
                await setDoc(adminDocRef, { password: 'admin123', updatedAt: new Date().toISOString() });
                state.adminCreds = 'admin123';
            } else {
                state.adminCreds = snap.data().password;
            }
        }

        async function checkPersistentSession(user) {
            const sessionRef = doc(db, 'artifacts', appId, 'users', user.uid, 'session', 'current');
            const snap = await getDoc(sessionRef);
            
            if (snap.exists()) {
                const sessionData = snap.data();
                if (sessionData.type === 'admin') {
                    state.view = 'admin-dash';
                } else if (sessionData.type === 'client') {
                    const clientSnap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'clients', sessionData.clientId));
                    if (clientSnap.exists()) {
                        state.currentClient = { id: clientSnap.id, ...clientSnap.data() };
                        state.view = 'client-dash';
                    }
                }
            }
            state.isCheckingSession = false;
            render();
        }

        function setupRealtimeListeners() {
            if (!state.user) return;

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), (snap) => {
                state.clients = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (state.currentClient) {
                    const fresh = state.clients.find(c => c.id === state.currentClient.id);
                    if (fresh) state.currentClient = fresh;
                }
                render();
            }, (err) => console.error("Clients Sync Error:", err));

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'transactions'), (snap) => {
                state.transactions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            }, (err) => console.error("Transactions Sync Error:", err));

            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'admin_access'), (snap) => {
                if (snap.exists()) state.adminCreds = snap.data().password;
            });
        }

        async function triggerEmails(type, data) {
            try {
                if (type === 'signup') {

                        to_email: data.email,
                        to_name: data.firstName
                    });
                } else if (type === 'transaction') {
                    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TRANS_TEMPLATE, {
                        name: data.client.firstName,
                        transaction_type: data.type === 'in' ? 'Deposit' : 'Withdrawal',
                        amount: `₦${Number(data.amount).toLocaleString()}`,
                        to_email: data.client.email
                    });
                } else if (type === 'password_change') {
                    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TRANS_TEMPLATE, {
                        name: data.firstName,
                        transaction_type: "SECURITY ALERT: Password Updated",
                        amount: "Your password was recently changed. If you did not authorize this, please contact support immediately.",
                        to_email: data.email
                    });
                }
            } catch (e) {
                console.error("Email notification failed", e);
            }
        }

        window.exportMemberData = () => {
            if (state.clients.length === 0) {

                return;
            }
            const headers = ["Member ID", "First Name", "Last Name", "Email", "Phone", "Segments", "Full Address", "Total Deposits (In)", "Total Payouts (Out)", "Net Balance"];
            const rows = state.clients.map(c => {
                const cTrans = state.transactions.filter(t => t.clientId === c.id);
                const tIn = cTrans.filter(t => t.type === 'in').reduce((acc, t) => acc + Number(t.amount), 0);
                const tOut = cTrans.filter(t => t.type === 'out').reduce((acc, t) => acc + Number(t.amount), 0);
                const segmentsStr = (c.segments || []).join('; ');
                const addressStr = (c.address || "").replace(/,/g, " ");
                return [c.displayId, c.firstName, c.lastName, c.email, `'${c.phone}`, segmentsStr, addressStr, tIn, tOut, tIn - tOut];

            const csvContent = "data:text/csv;charset=utf-8," + headers.join(",") + "\n" + rows.map(e => e.join(",")).join("\n");

        function renderDirectoryCategory(catId) {
            const filtered = state.clients.filter(c => {
                const hasPlan = (c.plans || []).some(pId => THRIFT_PLANS[catId].some(p => p.id === pId));
                const matchSearch = !state.clientsSearch || `${c.firstName} ${c.lastName}`.toLowerCase().includes(state.clientsSearch.toLowerCase()) || c.displayId.toLowerCase().includes(state.clientsSearch.toLowerCase());

            if (filtered.length === 0 && state.clientsSearch) return '';

v>`;

            return `
                <div class="max-w-xl mx-auto space-y-12 animate-in fade-in duration-500">
                    <form id="adminSettingsForm" class="bg-white rounded-[4rem] border border-zinc-100 p-12 lg:p-20 shadow-2xl space-y-12">
                        <div class="text-center">
                            <h2 class="text-3xl font-black text-ajo-black tracking-tighter uppercase mb-2">Admin Security</h2>
                            <p class="text-[10px] font-black uppercase tracking-[0.4em] text-ajo-brown italic">Update Access Key</p>
                        </div>
                        <div class="space-y-10">
                            ${renderPasswordField('Current Key', 'aCurrentPass')}
                            ${renderPasswordField('New Security Key', 'aNewPass')}
                        </div>
                        <button type="submit" class="w-full py-6 bg-ajo-black text-white rounded-3xl font-black uppercase tracking-[0.2em] text-[10px] shadow-xl hover:bg-ajo-brown transition-all">Update Master Key</button>
                    </form>
                </div>
            `;
        }

        function renderTransactionPanel() {
            const c = state.selectedClientForTrans;
            if (!c) return '';
            const cPlans = [...THRIFT_PLANS.daily, ...THRIFT_PLANS.weekly, ...THRIFT_PLANS.monthly].filter(p => (c.plans || []).includes(p.id));
            return `
                <div class="max-w-2xl mx-auto">
                    <div class="bg-white p-12 lg:p-20 rounded-[4rem] shadow-2xl border border-zinc-100 relative animate-in zoom-in duration-500">
                        <button onclick="window.navigateAdmin('clients')" class="absolute top-12 right-12 text-zinc-300 hover:text-ajo-black transition-colors"><i data-lucide="x" size="24"></i></button>
                        <div class="text-center mb-16 space-y-4">
                            <h2 class="text-3xl font-black tracking-tighter uppercase text-ajo-black">Ledger Transaction</h2>
                            <div class="inline-block px-5 py-2 bg-ajo-cream rounded-full text-ajo-brown font-mono font-bold text-[10px] tracking-widest">${c.displayId} | ${c.firstName} ${c.lastName}</div>
                        </div>
                        <form id="transactionEntryForm" class="space-y-10">
                            <div class="flex bg-ajo-cream/50 p-2 rounded-3xl shadow-inner">
                                <button type="button" onclick="window.setTransType('in')" class="flex-1 py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all ${state.currentTransType === 'in' ? 'bg-white text-green-700 shadow-xl' : 'text-zinc-400'}"><i data-lucide="arrow-down-left" size="14" class="inline mr-2"></i> Pay-In</button>
                                <button type="button" onclick="window.setTransType('out')" class="flex-1 py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all ${state.currentTransType === 'out' ? 'bg-white text-ajo-brown shadow-xl' : 'text-zinc-400'}"><i data-lucide="arrow-up-right" size="14" class="inline mr-2"></i> Pay-Out</button>
                            </div>
                            ${renderField('Transaction Amount (₦)', 'tAmt', 'number', true)}
                            <div class="space-y-2">
                                <label class="text-[9px] font-black uppercase text-zinc-400 tracking-widest ml-4">Target Plan</label>
                                <select id="tPlanSelect" class="w-full bg-ajo-cream/50 rounded-2xl px-6 py-5 text-[10px] font-black uppercase tracking-widest outline-none focus:bg-white transition-all shadow-inner" required>
                                    <option value="">Select Plan...</option>
                                    ${cPlans.map(p => `<option value="${p.id}">${p.label}</option>`).join('')}
                                </select>
                            </div>
                            <div class="border-4 border-dashed border-zinc-100 rounded-[3rem] p-12 text-center group hover:border-ajo-brown/20 transition-all bg-zinc-50/50 relative overflow-hidden">
                                <input type="file" id="tProof" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                                <i data-lucide="file-text" class="mx-auto text-zinc-200 group-hover:text-ajo-brown mb-6 transition-colors" size="48"></i>
                                <p class="text-[10px] font-black uppercase text-zinc-400 tracking-[0.25em]">Upload Proof of Payment</p>
                            </div>
                            <button type="submit" class="w-full py-7 bg-ajo-black text-white rounded-[2.5rem] font-black uppercase text-xs tracking-widest shadow-2xl hover:bg-ajo-brown transition-all">Commit to Ledger</button>
                        </form>
                    </div>
                </div>
            `;
        }

        function renderMemberSummary() {
            const c = state.currentClient;
            const t = state.transactions.filter(x => x.clientId === c.id);
            const bal = t.reduce((acc, x) => acc + (x.type === 'in' ? Number(x.amount) : -Number(x.amount)), 0);
            return `<div class="space-y-16 animate-in fade-in duration-500"><div class="bg-ajo-black p-12 md:p-20 rounded-[4rem] text-white relative overflow-hidden shadow-2xl"><div class="absolute -top-20 -right-20 w-80 h-80 bg-ajo-brown/10 rounded-full blur-[100px]"></div><p class="text-ajo-brown font-black uppercase text-[10px] mb-6 tracking-[0.5em]">Consolidated Net Savings</p><h3 class="text-6xl md:text-8xl font-black mb-12 tracking-tighter">₦${bal.toLocaleString()}</h3><div class="flex flex-wrap gap-4"><div class="px-6 py-3 bg-white/10 rounded-2xl text-[10px] font-black uppercase tracking-widest border border-white/5 font-mono">FAJ LEDGER: ${c.displayId}</div><div class="px-6 py-3 bg-ajo-brown rounded-2xl text-[10px] font-black uppercase tracking-widest">${(c.plans || []).length} Active Cycles</div></div></div><div class="space-y-10"><div class="flex items-center gap-4"><div class="w-2 h-8 bg-ajo-brown rounded-full"></div><h3 class="font-black uppercase text-[10px] tracking-[0.3em] text-ajo-black">My Savings Portfolio</h3></div><div class="grid gap-10">${['daily', 'weekly', 'monthly'].map(catId => { const plans = THRIFT_PLANS[catId].filter(p => (c.plans || []).includes(p.id)); if (plans.length === 0) return ''; return `<div class="bg-white rounded-[3rem] border border-zinc-100 shadow-sm overflow-hidden"><div class="p-8 border-b bg-zinc-50/50 flex justify-between items-center"><h4 class="font-black text-[10px] uppercase tracking-widest text-zinc-400">${catId} Series</h4></div><div class="overflow-x-auto"><table class="w-full text-left text-xs whitespace-nowrap"><thead class="bg-zinc-50 text-[9px] font-black uppercase border-b tracking-widest"><tr><th class="px-10 py-6">Target Plan</th><th class="px-10 py-6 text-center">Lifecycle Progress</th><th class="px-10 py-6 text-right">Plan Value</th></tr></thead><tbody class="divide-y divide-zinc-50">${plans.map(p => { const pT = state.transactions.filter(t => t.clientId === c.id && t.planId === p.id); const pVal = pT.reduce((acc, t) => acc + (t.type === 'in' ? Number(t.amount) : -Number(t.amount)), 0); const progress = Math.min((pVal / p.packValue) * 100, 100); return `<tr class="hover:bg-ajo-cream/10 transition-colors"><td class="px-10 py-8 font-black text-ajo-black text-sm tracking-tight">${p.label}</td><td class="px-10 py-8"><div class="flex items-center justify-center gap-4"><div class="w-40 bg-zinc-100 h-2 rounded-full overflow-hidden shadow-inner"><div class="bg-ajo-brown h-full transition-all duration-1000" style="width: ${progress}%"></div></div><span class="text-[10px] font-black text-zinc-400 tracking-tighter">${Math.round(progress)}%</span></div></td><td class="px-10 py-8 text-right font-black text-sm tracking-tighter text-ajo-black uppercase">₦${pVal.toLocaleString()}</td></tr>`; }).join('')}</tbody></table></div></div>`; }).join('')}</div></div></div>`;
        }

        function renderMemberProfile() {
            const c = state.currentClient;
            return `
                <div class="max-w-4xl mx-auto space-y-12 animate-in slide-in-from-bottom-10 duration-500">
                    <form id="memberProfileUpdateForm" class="bg-white rounded-[4rem] border border-zinc-100 p-12 lg:p-20 shadow-2xl space-y-12">
                        <div class="flex flex-col md:flex-row justify-between items-start gap-8 border-b border-zinc-50 pb-12">
                            <div>
                                <h2 class="text-4xl font-black text-ajo-black tracking-tighter uppercase mb-2">Member Identity</h2>
                                <p class="text-[10px] font-black uppercase tracking-[0.4em] text-ajo-brown italic">Self-Service Profile Management</p>
                            </div>
                            <div class="px-8 py-3 bg-ajo-black text-white rounded-2xl text-[10px] font-black uppercase tracking-[0.3em] font-mono">PORTFOLIO: ${c.displayId}</div>
                        </div>
                        <div class="grid md:grid-cols-2 gap-x-16 gap-y-10 text-sm">
                            ${renderReadOnlyItem('Legal Name', `${c.firstName} ${c.lastName}`)}
                            ${renderReadOnlyItem('Email Contact', c.email)}
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase text-zinc-400 tracking-widest ml-1">Mobile Line (Editable)</label>
                                <input type="text" id="mPhone" value="${c.phone}" class="w-full bg-ajo-cream/30 rounded-xl px-5 py-4 font-bold border border-transparent focus:border-ajo-brown/30 transition-all outline-none">
                            </div>
                            ${renderPasswordField('Access Password (Editable)', 'mPass', c.password)}
                            ${renderReadOnlyItem('Member Segment', c.segments?.join(', ') || 'General')}
                            <div class="md:col-span-2">${renderReadOnlyItem('Primary Address', c.address)}</div>
                        </div>
                        <div class="pt-6">
                            <button type="submit" class="w-full py-6 bg-ajo-black text-white rounded-3xl font-black uppercase tracking-[0.2em] text-[10px] shadow-xl hover:bg-ajo-brown transition-all">Save Profile Changes</button>
                        </div>
                    </form>
                </div>`;
        }

        function renderReadOnlyItem(l, v) {
            return `<div><p class="text-[10px] font-black uppercase text-zinc-300 tracking-widest mb-2">${l} (Locked)</p><p class="text-sm font-black text-ajo-black uppercase tracking-tight opacity-70">${v}</p></div>`;
        }

        function renderLedger(transactions, isClient = false) {
            const sorted = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));
            return `<div class="space-y-10 animate-in fade-in duration-500"><div class="flex items-center justify-between px-4"><h2 class="text-3xl font-black uppercase tracking-tighter text-ajo-black">Digital Ledger</h2><span class="text-[10px] font-black uppercase text-zinc-400 tracking-[0.4em]">${sorted.length} Records Found</span></div><div class="bg-white rounded-[3rem] border border-zinc-100 shadow-sm overflow-hidden"><div class="overflow-x-auto"><table class="w-full text-left text-xs whitespace-nowrap"><thead class="bg-zinc-50 text-[9px] font-black uppercase border-b tracking-[0.3em]"><tr><th class="px-10 py-6">Timestamp</th>${!isClient ? '<th class="px-10 py-6">Member Identity</th>' : ''}<th class="px-10 py-6">Action Event</th><th class="px-10 py-6 text-right">Value (₦)</th></tr></thead><tbody class="divide-y divide-zinc-50">${sorted.map(t => `<tr class="hover:bg-zinc-50 transition-colors"><td class="px-10 py-8 text-zinc-400 font-bold"><div class="text-ajo-black">${new Date(t.date).toLocaleDateString()}</div><div class="text-[8px] uppercase tracking-widest opacity-60 mt-1">${new Date(t.date).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div></td>${!isClient ? `<td class="px-10 py-8 font-black text-ajo-black uppercase tracking-tight">${t.clientName}</td>` : ''}<td class="px-10 py-8"><span class="px-4 py-1.5 rounded-lg font-black uppercase text-[9px] tracking-widest ${t.type === 'in' ? 'bg-green-100 text-green-700' : 'bg-ajo-brown/10 text-ajo-brown'}">${t.type === 'in' ? 'Deposit Entry' : 'Withdrawal Entry'}</span></td><td class="px-10 py-8 text-right font-black text-base ${t.type === 'in' ? 'text-green-700' : 'text-ajo-black'}">₦${Number(t.amount).toLocaleString()}</td></tr>`).join('')}${sorted.length === 0 ? `<tr><td colspan="${isClient ? 3 : 4}" class="px-10 py-20 text-center text-[10px] font-black text-zinc-300 uppercase tracking-widest">No ledger entries found</td></tr>` : ''}</tbody></table></div></div></div>`;
        }

        function renderSuccessModal() {
            return `<div class="fixed inset-0 z-[100] flex items-center justify-center p-6 modal-blur animate-in fade-in duration-300"><div class="bg-white rounded-[4rem] p-12 lg:p-20 max-w-xl w-full text-center shadow-2xl animate-in zoom-in duration-500"><div class="w-20 h-20 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-10 shadow-inner"><i data-lucide="check-circle" class="text-green-500" size="40"></i></div><h3 class="text-3xl font-black text-ajo-black mb-6 uppercase tracking-tighter">Identity Authorized</h3><p class="text-zinc-500 text-sm leading-relaxed mb-12">Your savings portfolio has been initialized in our secure digital ledger. Please check your email <b>${state.lastSignupId}</b> for your unique member ID and portal access instructions.</p><button onclick="window.navigate('client-login')" class="w-full py-6 bg-ajo-black text-white rounded-3xl font-black uppercase tracking-widest text-[10px] shadow-2xl hover:bg-ajo-brown transition-all">Proceed to Login</button></div></div>`;
        }

        function attachDomEvents() {
            const forms = ['clientLoginForm', 'adminLoginForm', 'signupForm', 'createMemberForm', 'editMemberForm', 'transactionEntryForm', 'memberProfileUpdateForm', 'adminSettingsForm'];
            forms.forEach(formId => {
                const el = document.getElementById(formId);
                if (el) el.onsubmit = (e) => handleFormSubmit(e, formId);
            });

            const searchInput = document.getElementById('clientSearchInput');
            if (searchInput) {
                searchInput.oninput = (e) => {
                    state.clientsSearch = e.target.value;
                    render();
                    const input = document.getElementById('clientSearchInput');
                    if (input) { input.focus(); input.setSelectionRange(input.value.length, input.value.length); }
                };
            }
        }

        async function handleFormSubmit(e, formId) {
            e.preventDefault();
            if (state.isProcessing) return;
            state.isProcessing = true;

            try {
                if (formId === 'adminLoginForm') {
                    const pass = document.getElementById('authPass').value;
                    if (pass === state.adminCreds) { 
                        const sessionRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'session', 'current');
                        await setDoc(sessionRef, { type: 'admin', lastActive: new Date().toISOString() });
                        state.view = 'admin-dash'; showToast('Admin access authorized'); 
                    } else { state.error = 'Invalid security credentials'; }
                }

                if (formId === 'clientLoginForm') {
                    const id = document.getElementById('authId').value.trim().toUpperCase();
                    const pass = document.getElementById('authPass').value;
                    const found = state.clients.find(c => c.displayId === id && c.password === pass);
                    if (found) { 
                        const sessionRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'session', 'current');
                        await setDoc(sessionRef, { type: 'client', clientId: found.id, lastActive: new Date().toISOString() });
                        state.currentClient = found; state.view = 'client-dash'; showToast('Welcome back, ' + found.firstName); 
                    } else { state.error = 'Invalid ID or password'; }
                }

                if (formId === 'signupForm') {
                    const emailValue = document.getElementById('sEmail').value.trim().toLowerCase();
                    if (state.clients.some(c => c.email.toLowerCase() === emailValue)) throw new Error("Email already exists.");
                    const pass = document.getElementById('sPass').value;
                    if (pass !== document.getElementById('sPassConfirm').value) throw new Error('Passwords do not match');
                    validatePasswordPolicy(pass);
                    const plans = Array.from(document.querySelectorAll('input[name="sPlans"]:checked')).map(el => el.value);
                    if (!plans.length) throw new Error('Selection of at least one plan is required');
                    const displayId = generateNextMemberId();
                    const clientData = { firstName: document.getElementById('sFirst').value, lastName: document.getElementById('sLast').value, email: emailValue, phone: document.getElementById('sPhone').value, password: pass, address: document.getElementById('sAddr').value, segments: Array.from(document.querySelectorAll('input[name="sSegments"]:checked')).map(el => el.value), plans, displayId, dateCreated: new Date().toISOString() };
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), clientData);
                    await triggerEmails('signup', clientData);
                    state.lastSignupId = clientData.email; state.showSignupSuccess = true;
                }

                if (formId === 'createMemberForm') {
                    const emailValue = document.getElementById('cEmail').value.trim().toLowerCase();
                    if (state.clients.some(c => c.email.toLowerCase() === emailValue)) throw new Error("Email exists.");
                    const pass = document.getElementById('cPass').value;
                    validatePasswordPolicy(pass);
                    const displayId = generateNextMemberId();
                    const clientData = { firstName: document.getElementById('cFirst').value, lastName: document.getElementById('cLast').value, email: emailValue, phone: document.getElementById('cPhone').value, address: document.getElementById('cAddr').value, segments: Array.from(document.querySelectorAll('input[name="cSegments"]:checked')).map(el => el.value), plans: Array.from(document.querySelectorAll('input[name="cPlans"]:checked')).map(el => el.value), displayId, password: pass, dateCreated: new Date().toISOString() };
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), clientData);
                    await triggerEmails('signup', clientData);
                    showToast('Member enrolled'); state.adminActiveView = 'clients';
                }

                if (formId === 'editMemberForm') {
                    const pass = document.getElementById('cPass').value;
                    validatePasswordPolicy(pass);
                    const clientRef = doc(db, 'artifacts', appId, 'public', 'data', 'clients', state.editingClient.id);
                    const updatedData = { firstName: document.getElementById('cFirst').value, lastName: document.getElementById('cLast').value, email: document.getElementById('cEmail').value, phone: document.getElementById('cPhone').value, address: document.getElementById('cAddr').value, segments: Array.from(document.querySelectorAll('input[name="cSegments"]:checked')).map(el => el.value), plans: Array.from(document.querySelectorAll('input[name="cPlans"]:checked')).map(el => el.value), password: pass };
                    await updateDoc(clientRef, updatedData);
                    if (pass !== state.editingClient.password) await triggerEmails('password_change', updatedData);
                    showToast('Profile updated'); state.editingClient = null; state.adminActiveView = 'clients';
                }

                if (formId === 'memberProfileUpdateForm') {
                    const newPass = document.getElementById('mPass').value;
                    validatePasswordPolicy(newPass);
                    const clientRef = doc(db, 'artifacts', appId, 'public', 'data', 'clients', state.currentClient.id);
                    await updateDoc(clientRef, { phone: document.getElementById('mPhone').value, password: newPass });
                    if (newPass !== state.currentClient.password) await triggerEmails('password_change', state.currentClient);
                    showToast('Updated successfully');
                }

                if (formId === 'adminSettingsForm') {
                    const currentPass = document.getElementById('aCurrentPass').value;
                    const newPass = document.getElementById('aNewPass').value;
                    if (currentPass !== state.adminCreds) throw new Error("Current security key is incorrect.");
                    validatePasswordPolicy(newPass);
                    const adminDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'admin_access');
                    await updateDoc(adminDocRef, { password: newPass, updatedAt: new Date().toISOString() });
                    showToast("Admin Security Key updated.");
                    state.adminActiveView = 'dashboard';
                }

                if (formId === 'transactionEntryForm') {
                    const client = state.selectedClientForTrans;
                    const amt = document.getElementById('tAmt').value;
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'transactions'), { clientId: client.id, clientName: `${client.firstName} ${client.lastName}`, amount: amt, planId: document.getElementById('tPlanSelect').value, type: state.currentTransType, date: new Date().toISOString() });
                    await triggerEmails('transaction', { client, amount: amt, type: state.currentTransType });
                    showToast('Logged to ledger'); state.adminActiveView = 'history';
                }
                render();
            } catch (err) { console.error(err); showToast(err.message, 'error'); } 
            finally { state.isProcessing = false; }
        }

        window.onload = initApp;
    </script>
</body>
</html>
