        async function initAuth() {
            try {
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    state.user = user;
                    if (user) setupDataListeners();
                    render();
                });
            } catch (err) { showError(err.message); }
        }

        function setupDataListeners() {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), (snap) => {
                state.clients = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'transactions'), (snap) => {
                state.transactions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            });
        }

        async function triggerEmails(type, data) {
            try {
                if(type === 'signup') {
                    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_SIGNUP_TEMPLATE, {
                        client_id: data.displayId,
                        to_email: data.email,
                        to_name: data.firstName
                    });
                    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TRANS_TEMPLATE, {
                        name: "Admin",
                        transaction_type: "Registration",
                        amount: `New User: ${data.firstName} ${data.lastName} (${data.displayId})`,
                        to_email: "femiajoplace@gmail.com"
                    });
                } else if(type === 'transaction') {
                    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TRANS_TEMPLATE, {
                        name: data.client.firstName,
                        transaction_type: data.type === 'in' ? 'Deposit' : 'Withdrawal',
                        amount: `₦${Number(data.amount).toLocaleString()}`,
                        to_email: data.client.email
                    });
                }
            } catch (e) { console.error("EmailJS Error", e); }
        }

        function handleClientLogin(id) {
            if(!id) return;
            const cleanId = id.trim().toUpperCase();
            const found = state.clients.find(c => c.displayId === cleanId);
            if (found) { state.currentClient = found; state.view = 'client-dash'; state.error = ''; } 
            else { state.error = 'Invalid Access ID. Please verify your email.'; }
            render();
        }

        function handleAdminLogin(pass) {
            if (pass === 'admin123') { state.view = 'admin-dash'; state.error = ''; } 
            else { state.error = 'Access key incorrect.'; }
            render();
        }

                case 'signup': html = renderSignup(); break;
                case 'admin-login': html = renderAdminLogin(); break;
                case 'client-login': html = renderClientLogin(); break;
                case 'admin-dash': html = renderDashboardLayout('admin'); break;
                case 'client-dash': html = renderDashboardLayout('client'); break;
            }
            if(state.showSignupSuccess) html += renderSuccessModal();
            appDiv.innerHTML = html;
            lucide.createIcons();
            attachListeners();
        }

                                        ${THRIFT_PLANS[cat].map(p => `<label class="flex items-center gap-4 p-4 border border-zinc-100 rounded-2xl cursor-pointer has-[:checked]:bg-ajo-cream/50"><input type="checkbox" name="sPlans" value="${p.id}" class="w-4 h-4 accent-ajo-brown"><span class="text-[10px] font-bold text-ajo-black">${p.label}</span></label>`).join('')}
                                    </div>
                                </div>`).join('')}
                        </div>
                        <button type="submit" class="w-full py-6 bg-ajo-black text-white rounded-3xl font-black uppercase tracking-widest text-xs hover:bg-ajo-brown transition-all">Initialize Membership</button>
                        <button type="button" onclick="window.navigate('landing')" class="w-full text-zinc-400 text-[10px] font-black uppercase">Cancel</button>
                    </form>
                </div>`;
        }

        function renderAdminLogin() {
            return `<div class="min-h-screen bg-ajo-black flex items-center justify-center p-6"><div class="w-full max-w-md bg-white rounded-[2.5rem] p-10 shadow-2xl space-y-8 animate-in zoom-in"><div class="text-center"><h2 class="text-2xl font-black text-ajo-brown-dark tracking-tight uppercase">Security Portal</h2></div><form id="adminLoginForm" class="space-y-6"><input type="password" id="adminPass" class="w-full bg-ajo-cream border-transparent rounded-2xl px-5 py-4 text-sm outline-none focus:bg-white focus:ring-2 focus:ring-ajo-brown/20" placeholder="Access Key" required>${state.error ? `<p class="text-red-500 text-[10px] font-bold">${state.error}</p>` : ''}<button type="submit" class="w-full py-5 bg-ajo-black text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Authorize Access</button></form><button onclick="window.navigate('landing')" class="w-full text-zinc-400 text-[10px] uppercase font-black tracking-widest">Exit</button></div></div>`;
        }

        function renderClientLogin() {
            return `<div class="min-h-screen bg-ajo-cream flex items-center justify-center p-6"><div class="w-full max-w-md bg-white rounded-[2.5rem] p-10 shadow-2xl animate-in zoom-in border border-ajo-brown/5"><div class="text-center"><h2 class="text-2xl font-black text-ajo-brown-dark tracking-tight uppercase">Member Access</h2></div><form id="clientLoginForm" class="space-y-6"><input type="text" id="clientId" placeholder="FAJ-XXXX-XXXX" class="w-full bg-ajo-cream border-transparent rounded-2xl px-5 py-4 text-sm uppercase font-mono focus:bg-white focus:ring-2 focus:ring-ajo-brown/20 outline-none">${state.error ? `<p class="text-red-500 text-[10px] font-bold">${state.error}</p>` : ''}<button type="submit" class="w-full py-5 bg-ajo-black text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl">Initialize Dashboard</button></form><button onclick="window.navigate('landing')" class="w-full text-zinc-400 text-[10px] uppercase font-black tracking-widest">Return Home</button></div></div>`;
        }

        function renderDashboardLayout(type) {
            const is_admin = type === 'admin';
            const activeView = is_admin ? state.adminActiveView : state.clientActiveView;
            const currentObj = is_admin ? { firstName: 'System', lastName: 'Admin' } : state.currentClient;

            return `<div class="flex h-screen overflow-hidden bg-white"><aside class="sidebar-transition fixed lg:relative z-50 bg-ajo-black text-white h-screen flex flex-col shadow-2xl ${state.mobileSidebarOpen ? 'translate-x-0 w-64' : '-translate-x-full lg:translate-x-0 w-64'} ${!state.isSidebarOpen && !state.mobileSidebarOpen ? 'lg:w-20' : 'lg:w-64'}"><div class="p-6 flex items-center gap-3 border-b border-zinc-900"><div class="w-8 h-8 bg-ajo-brown rounded-lg flex items-center justify-center font-bold shrink-0 shadow-lg">F</div><span class="font-black text-xs uppercase tracking-widest whitespace-nowrap overflow-hidden transition-all ${(!state.isSidebarOpen && !state.mobileSidebarOpen) ? 'w-0 opacity-0' : 'w-auto opacity-100'}">Femi Ajo</span><button onclick="window.toggleMobileSidebar()" class="lg:hidden absolute right-4"><i data-lucide="x" size="20"></i></button></div><nav class="flex-1 mt-6 px-3 space-y-2">${is_admin ? `${renderNavItem('layout-dashboard', 'Summary', activeView === 'dashboard', 'navigateAdmin', 'dashboard')}${renderNavItem('users', 'Members', activeView === 'clients', 'navigateAdmin', 'clients')}${renderNavItem('plus-circle', 'Register', activeView === 'create', 'navigateAdmin', 'create')}${renderNavItem('book-open', 'Master Ledger', activeView === 'history', 'navigateAdmin', 'history')}` : `${renderNavItem('layout-dashboard', 'Summary', activeView === 'dashboard', 'navigateClient', 'dashboard')}${renderNavItem('user-circle', 'My Profile', activeView === 'my-profile', 'navigateClient', 'my-profile')}${renderNavItem('file-text', 'Subscr.', activeView === 'my-plans', 'navigateClient', 'my-plans')}${renderNavItem('history', 'History', activeView === 'my-history', 'navigateClient', 'my-history')}`}</nav><div class="p-4 border-t border-zinc-900"><button onclick="window.handleLogout()" class="w-full py-3 px-3 bg-zinc-800 text-zinc-400 rounded-2xl text-[10px] font-black uppercase flex items-center justify-center gap-2 hover:bg-red-900/10 transition-all shadow-sm"><i data-lucide="log-out" size="14"></i><span class="${(!state.isSidebarOpen && !state.mobileSidebarOpen) ? 'hidden' : 'inline'}">Exit Session</span></button></div></aside><main class="flex-1 overflow-y-auto w-full relative">${state.mobileSidebarOpen ? `<div onclick="window.toggleMobileSidebar()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 lg:hidden"></div>` : ''}<header class="sticky top-0 bg-white/80 backdrop-blur-xl border-b border-zinc-100 px-4 sm:px-10 py-3 flex justify-between items-center z-10"><div class="flex items-center gap-4"><button onclick="window.toggleMobileSidebar()" class="lg:hidden p-2 bg-ajo-cream rounded-xl text-ajo-brown shadow-inner"><i data-lucide="menu" size="20"></i></button><div><h1 class="text-xs font-black uppercase text-zinc-400 mb-0.5">${is_admin ? 'Administration' : 'Profile: ' + currentObj.displayId}</h1><p class="text-sm font-bold text-ajo-black tracking-tight">${currentObj.firstName} ${currentObj.lastName}</p></div></div><div class="w-10 h-10 rounded-xl bg-ajo-brown-dark flex items-center justify-center text-white font-bold text-xs shadow-lg ring-4 ring-ajo-cream">${currentObj.firstName[0]}${currentObj.lastName[0] || ''}</div></header><div class="p-4 sm:p-10">${renderDashboardView(is_admin, activeView)}</div></main></div>`;
        }

        function renderDashboardView(is_admin, view) {
            if(is_admin) {
                switch (view) {
                    case 'dashboard': return renderAdminDashboard();
                    case 'clients': return renderAdminClients();
                    case 'create': return renderAdminForm();
                    case 'edit': return renderAdminForm(true);
                    case 'history': return renderLedger(state.transactions);
                    case 'transaction': return renderTransactionEntry();
                    default: return '';
                }
            } else {
                switch (view) {
                    case 'dashboard': return renderClientDashboard();
                    case 'my-profile': return renderClientProfile();
                    case 'my-plans': return renderClientPlans();
                    case 'my-history': return renderLedger(state.transactions.filter(t => t.clientId === state.currentClient.id), true);
                    default: return '';
                }
            }
        }

        function renderAdminDashboard() {
            const tIn = state.transactions.filter(x => x.type === 'in').reduce((a, b) => a + Number(b.amount), 0);
            const tOut = state.transactions.filter(x => x.type === 'out').reduce((a, b) => a + Number(b.amount), 0);
            return `<div class="space-y-8 animate-in fade-in"><div class="grid grid-cols-1 sm:grid-cols-3 gap-6">${renderStat('Verified Portfolios', state.clients.length, 'users', 'Members')}${renderStat('Total Inflow', '₦' + tIn.toLocaleString(), 'arrow-down-left', 'Deposits', 'text-green-600')}${renderStat('Payout Cycle', '₦' + tOut.toLocaleString(), 'arrow-up-right', 'Payouts', 'text-ajo-brown')}</div><div class="bg-white rounded-[2rem] border border-zinc-100 shadow-sm overflow-hidden"><div class="p-6 border-b flex justify-between items-center bg-zinc-50"><h2 class="font-black text-[10px] uppercase tracking-widest text-zinc-400">Recent Members</h2><button onclick="window.navigateAdmin('clients')" class="text-[10px] text-ajo-brown font-black uppercase hover:underline">Full Directory</button></div><div class="ledger-scroll"><table class="w-full text-left text-xs whitespace-nowrap"><thead class="bg-zinc-50 text-[9px] font-black uppercase border-b tracking-widest"><tr><th class="px-8 py-5">Access ID</th><th class="px-8 py-5">Full Name</th><th class="px-8 py-5 text-right">Action</th></tr></thead><tbody class="divide-y divide-zinc-50">${state.clients.slice(-5).reverse().map(c => `<tr class="hover:bg-ajo-cream/20 transition-colors"><td class="px-8 py-5 font-mono font-bold text-ajo-brown">${c.displayId}</td><td class="px-8 py-5 font-bold tracking-tight text-ajo-black uppercase">${c.firstName} ${c.lastName}</td><td class="px-8 py-5 text-right"><button onclick="recordTransactionFor('${c.id}')" class="bg-ajo-brown/10 text-ajo-brown font-black text-[9px] uppercase tracking-widest px-4 py-2 rounded-lg hover:bg-ajo-brown hover:text-white transition-all shadow-sm font-bold">Record</button></td></tr>`).join('')}</tbody></table></div></div></div>`;
        }

        function renderStat(l, v, i, s, c = '') {
            return `<div class="bg-white p-8 rounded-[2.5rem] border border-zinc-100 shadow-sm flex items-start gap-5 hover:shadow-xl transition-all"><div class="w-12 h-12 bg-ajo-cream rounded-2xl flex items-center justify-center text-ajo-brown shrink-0 shadow-inner"><i data-lucide="${i}" size="20"></i></div><div><p class="text-zinc-400 font-black uppercase text-[8px] mb-2 tracking-[0.2em]">${l}</p><h4 class="text-xl sm:text-2xl font-black ${c} tracking-tight">${v}</h4><p class="text-[10px] font-bold text-zinc-400 mt-1 uppercase tracking-widest">${s}</p></div></div>`;
        }

        function renderAdminClients() {
            return `<div class="space-y-10 animate-in fade-in"><div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6"><div><h2 class="text-2xl font-black tracking-tighter uppercase text-ajo-black">Member Directory</h2><p class="text-[9px] font-bold text-zinc-400 uppercase tracking-widest mt-1">Management Console</p></div><input type="text" id="clientSearch" value="${state.clientsSearch}" placeholder="SEARCH RECORDS..." class="w-full sm:w-80 bg-ajo-cream rounded-3xl pl-6 pr-6 py-4 text-[10px] font-black outline-none transition-all uppercase tracking-widest focus:bg-white focus:ring-2 focus:ring-ajo-brown/10 shadow-inner"></div>${renderAdminClientCategory('daily')}${renderAdminClientCategory('weekly')}${renderAdminClientCategory('monthly')}</div>`;
        }

        function renderAdminClientCategory(catId) {
            const filtered = state.clients.filter(c => {
                const hasPlan = (c.plans || []).some(pId => THRIFT_PLANS[catId].some(p => p.id === pId));
                const match = !state.clientsSearch || (c.firstName + ' ' + (c.lastName || '')).toLowerCase().includes(state.clientsSearch.toLowerCase()) || (c.displayId || '').toLowerCase().includes(state.clientsSearch.toLowerCase());
                return hasPlan && match;
            });
            return `<div class="space-y-4"><div class="flex items-center gap-3"><div class="w-1.5 h-6 bg-ajo-brown rounded-full"></div><h3 class="font-black uppercase text-[10px] tracking-[0.2em] text-ajo-black">${catId} RECORDS (${filtered.length})</h3></div><div class="bg-white rounded-[2rem] border border-zinc-100 shadow-sm overflow-hidden"><div class="ledger-scroll min-w-full"><table class="w-full text-left text-xs whitespace-nowrap"><thead class="bg-zinc-50 text-[9px] font-black uppercase border-b tracking-[0.2em]"><tr><th class="px-8 py-5">Access ID</th><th class="px-8 py-5">Member Name</th><th class="px-8 py-5 text-center text-green-700 font-black">In</th><th class="px-8 py-5 text-center text-ajo-brown font-black">Out</th><th class="px-8 py-5 text-right">Actions</th></tr></thead><tbody class="divide-y divide-zinc-50">${filtered.map(c => {
                const cTrans = state.transactions.filter(t => t.clientId === c.id && (THRIFT_PLANS[catId] || []).some(p => p.id === t.planId));
                const tIn = cTrans.filter(t => t.type === 'in').reduce((a, b) => a + Number(b.amount), 0);
                const tOut = cTrans.filter(t => t.type === 'out').reduce((a, b) => a + Number(b.amount), 0);
                return `<tr class="hover:bg-ajo-cream/10 transition-colors"><td class="px-8 py-5 font-mono font-bold text-ajo-brown">${c.displayId}</td><td class="px-8 py-5"><div class="font-bold text-ajo-black">${c.firstName} ${c.lastName || ''}</div><div class="text-[9px] text-zinc-400 uppercase mt-1 font-black">S: ${c.segments?.join('/') || 'Individual'}</div></td><td class="px-8 py-5 text-center text-green-700 font-black">₦${tIn.toLocaleString()}</td><td class="px-8 py-5 text-center text-ajo-brown font-black">₦${tOut.toLocaleString()}</td><td class="px-8 py-5 text-right flex items-center justify-end gap-2 pt-5"><button onclick="recordTransactionFor('${c.id}')" class="p-2.5 bg-ajo-brown/10 text-ajo-brown rounded-xl"><i data-lucide="plus" size="16"></i></button><button onclick="editClient('${c.id}')" class="p-2.5 bg-zinc-100 text-zinc-500 rounded-xl hover:bg-ajo-black hover:text-white transition-all"><i data-lucide="edit-3" size="16"></i></button></td></tr>`;
            }).join('')}</tbody></table></div></div></div>`;
        }

        function renderAdminForm(isEdit = false) {
            const data = isEdit ? state.editingClient : { firstName: '', lastName: '', email: '', phone: '', address: '', plans: [], segments: [] };
            return `<div class="max-w-3xl mx-auto animate-in fade-in slide-in-from-bottom-6"><form id="${isEdit ? 'editPortfolioForm' : 'createPortfolioForm'}" class="bg-white p-8 sm:p-12 rounded-[3rem] border border-zinc-100 shadow-2xl space-y-10"><div class="text-center uppercase"><h2 class="text-2xl font-black tracking-tighter">${isEdit ? 'Modify Account' : 'Manual Registration'}</h2></div><div class="grid grid-cols-1 sm:grid-cols-2 gap-8"><div class="space-y-2"><label class="text-[9px] font-black text-zinc-500 uppercase ml-2 tracking-widest">First Name</label><input type="text" id="cFirst" value="${data.firstName}" class="w-full bg-ajo-cream rounded-2xl px-5 py-4 text-sm focus:bg-white outline-none transition-all shadow-inner" required></div><div class="space-y-2"><label class="text-[9px] font-black text-zinc-500 uppercase ml-2 tracking-widest">Last Name</label><input type="text" id="cLast" value="${data.lastName || ''}" class="w-full bg-ajo-cream rounded-2xl px-5 py-4 text-sm focus:bg-white outline-none transition-all shadow-inner" required></div><div class="space-y-2"><label class="text-[9px] font-black text-zinc-500 uppercase ml-2 tracking-widest">Contact Phone</label><input type="text" id="cPhone" value="${data.phone || ''}" class="w-full bg-ajo-cream rounded-2xl px-5 py-4 text-sm focus:bg-white outline-none transition-all shadow-inner" required></div><div class="space-y-2"><label class="text-[9px] font-black text-zinc-500 uppercase ml-2 tracking-widest">Email Address</label><input type="email" id="cEmail" value="${data.email || ''}" class="w-full bg-ajo-cream rounded-2xl px-5 py-4 text-sm focus:bg-white outline-none transition-all shadow-inner" required></div></div><div class="space-y-2"><label class="text-[9px] font-black text-zinc-500 uppercase ml-2 tracking-widest">Full Address</label><input type="text" id="cAddr" value="${data.address || ''}" class="w-full bg-ajo-cream rounded-2xl px-5 py-4 text-sm focus:bg-white outline-none transition-all shadow-inner" required></div><div class="space-y-8"><p class="text-[10px] font-black uppercase tracking-widest text-ajo-brown border-b pb-4">Classification</p><div class="flex flex-wrap gap-3">${SEGMENTS.map(s => `<label class="flex items-center gap-3 px-5 py-3 border border-zinc-100 rounded-2xl cursor-pointer hover:bg-ajo-cream transition-all has-[:checked]:bg-ajo-black has-[:checked]:text-white"><input type="checkbox" name="cSegments" value="${s}" class="w-4 h-4 accent-ajo-brown" ${(data.segments || []).includes(s) ? 'checked' : ''}><span class="text-[10px] font-black tracking-widest uppercase">${s}</span></label>`).join('')}</div></div><div class="space-y-10"><p class="text-[10px] font-black uppercase tracking-widest text-ajo-brown border-b pb-4 text-left">Subscription Plans</p>${['daily', 'weekly', 'monthly'].map(cat => `<div class="space-y-4"><h4 class="text-[8px] font-black uppercase text-zinc-400 ml-2">${cat} Options</h4><div class="grid grid-cols-1 gap-2">${THRIFT_PLANS[cat].map(p => `<label class="flex items-center gap-4 p-4 border border-zinc-100 rounded-2xl cursor-pointer has-[:checked]:bg-ajo-cream/50 transition-all"><input type="checkbox" name="cPlans" value="${p.id}" class="w-5 h-5 accent-ajo-brown" ${(data.plans || []).includes(p.id) ? 'checked' : ''}><span class="text-[11px] font-bold text-ajo-black tracking-tight">${p.label}</span></label>`).join('')}</div></div>`).join('')}</div><button type="submit" class="w-full py-6 bg-ajo-black text-white rounded-[2rem] font-black uppercase tracking-widest text-xs hover:bg-ajo-brown transition-all shadow-xl">${isEdit ? 'Update Portfolio' : 'Authorize Membership'}</button></form></div>`;
        }

        function renderTransactionEntry() {
            const c = state.selectedClientForTrans;
            const cPlans = [...THRIFT_PLANS.daily, ...THRIFT_PLANS.weekly, ...THRIFT_PLANS.monthly].filter(p => (c.plans || []).includes(p.id));
            return `<div class="max-w-xl mx-auto bg-white p-8 sm:p-12 rounded-[3rem] shadow-2xl border border-zinc-100 relative animate-in zoom-in"><button onclick="window.navigateAdmin('clients')" class="absolute top-8 right-8 text-zinc-300 hover:text-ajo-black transition-colors"><i data-lucide="x" size="24"></i></button><h2 class="text-2xl font-black mb-10 border-b pb-4 uppercase tracking-tighter">Secure Ledger Entry</h2><form id="transForm" class="space-y-8"><div class="flex bg-ajo-cream p-1.5 rounded-2xl shadow-inner"><button type="button" onclick="window.setTransType('in')" id="typeIn" class="flex-1 py-4 rounded-xl font-black text-[10px] uppercase tracking-widest bg-white text-green-700 shadow-md">Pay-In</button><button type="button" onclick="window.setTransType('out')" id="typeOut" class="flex-1 py-4 rounded-xl font-black text-[10px] uppercase tracking-widest text-zinc-500">Pay-Out</button></div><input type="number" id="tAmt" class="w-full bg-ajo-cream rounded-2xl px-5 py-4 text-sm font-black outline-none border-transparent focus:bg-white focus:ring-2 focus:ring-ajo-brown/10" placeholder="Amount (₦)" required><select id="tPlan" class="w-full bg-ajo-cream rounded-2xl px-5 py-4 text-[10px] font-black uppercase outline-none focus:bg-white" required><option value="">Select Plan Context...</option>${cPlans.map(p => `<option value="${p.id}">${p.label.toUpperCase()}</option>`).join('')}</select><div class="border-2 border-dashed border-zinc-200 rounded-3xl p-10 bg-ajo-cream/30 text-center relative group hover:bg-white transition-all"><input type="file" id="tProof" class="absolute inset-0 opacity-0 cursor-pointer"><i data-lucide="file-text" class="mx-auto text-ajo-brown mb-3" size="32"></i><p class="text-[9px] font-black uppercase text-zinc-400">Click to upload slip</p></div><button type="submit" class="w-full py-6 bg-ajo-black text-white rounded-[2rem] font-black uppercase text-xs tracking-widest shadow-xl">Submit Transaction</button></form></div>`;
        }

        function renderLedger(transactions, isClient = false) {
            const sorted = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));
            return `<div class="space-y-6 animate-in fade-in"><div class="flex items-center justify-between px-2"><h2 class="text-2xl font-black uppercase tracking-tighter text-ajo-black">Ledger Records</h2><span class="text-[9px] font-black uppercase text-zinc-400 tracking-[0.2em]">${sorted.length} ENTRIES</span></div><div class="bg-white rounded-[2.5rem] border border-zinc-100 shadow-sm overflow-hidden"><div class="ledger-scroll min-w-full"><table class="w-full text-left text-xs whitespace-nowrap"><thead class="bg-zinc-50 text-[9px] font-black uppercase border-b tracking-widest"><tr><th class="px-8 py-5">Date / Time</th>${!isClient ? '<th class="px-8 py-5">Member</th>' : ''}<th class="px-8 py-5">Event</th><th class="px-8 py-5 text-right">Value</th></tr></thead><tbody class="divide-y divide-zinc-50">${sorted.map(t => `<tr class="hover:bg-zinc-50 transition-colors"><td class="px-8 py-5 text-zinc-500 font-bold">${new Date(t.date).toLocaleDateString()}<br><span class="opacity-50 text-[8px] uppercase font-black">${new Date(t.date).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span></td>${!isClient ? `<td class="px-8 py-5 font-bold tracking-tight text-ajo-black uppercase">${t.clientName}</td>` : ''}<td class="px-8 py-5"><span class="px-3 py-1 rounded-lg font-black uppercase text-[8px] tracking-widest ${t.type === 'in' ? 'bg-green-100 text-green-800' : 'bg-ajo-brown/10 text-ajo-brown'}">${t.type === 'in' ? 'Deposit' : 'Withdrawal'}</span></td><td class="px-8 py-5 text-right font-black text-sm ${t.type === 'in' ? 'text-green-700' : 'text-ajo-black'}">₦${Number(t.amount).toLocaleString()}</td></tr>`).join('')}</tbody></table></div></div></div>`;
        }

        function renderClientDashboard() {
            const c = state.currentClient;
            const t = state.transactions.filter(x => x.clientId === c.id);
            const tIn = t.filter(x => x.type === 'in').reduce((a, b) => a + Number(b.amount), 0);
            const tOut = t.filter(x => x.type === 'out').reduce((a, b) => a + Number(b.amount), 0);
            return `<div class="space-y-10 animate-in fade-in"><div class="bg-ajo-black p-10 sm:p-14 rounded-[3.5rem] text-white relative overflow-hidden shadow-2xl"><div class="absolute -top-10 -right-10 w-64 h-64 bg-ajo-brown/10 rounded-full blur-[80px]"></div><p class="text-ajo-brown font-black uppercase text-[10px] mb-4 tracking-[0.3em]">Consolidated Balance</p><h3 class="text-5xl sm:text-7xl font-black mb-10 tracking-tighter">₦${(tIn - tOut).toLocaleString()}</h3><div class="flex flex-wrap gap-3"><div class="px-5 py-2 bg-white/10 rounded-2xl text-[10px] font-black uppercase border border-white/5 font-mono tracking-widest">${c.displayId}</div><div class="px-5 py-2 bg-ajo-brown rounded-2xl text-[10px] font-black uppercase tracking-widest">${(c.plans || []).length} Active Plans</div></div></div>${renderClientPlans()}</div>`;
        }

        function renderClientProfile() {
            const c = state.currentClient;
            return `
                <div class="max-w-4xl mx-auto space-y-10 animate-in fade-in slide-in-from-bottom-6">
                    <div class="bg-white rounded-[3rem] border border-zinc-100 p-8 sm:p-12 shadow-xl premium-shadow">
                        <div class="flex flex-col sm:flex-row justify-between items-start gap-6 border-b border-zinc-50 pb-8 mb-8 text-left">
                            <div>
                                <h2 class="text-3xl font-black text-ajo-black tracking-tighter uppercase mb-2">Member Profile</h2>
                                <p class="text-[10px] font-black uppercase tracking-[0.2em] text-ajo-brown italic">Secure Portfolio Data</p>
                            </div>
                            <div class="px-5 py-2 bg-ajo-cream text-ajo-brown-dark rounded-xl text-[10px] font-black uppercase tracking-widest border border-ajo-brown/10 font-mono">ID: ${c.displayId}</div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8 text-sm text-left">
                            <div><p class="text-[9px] font-black uppercase text-zinc-400 tracking-widest mb-1">Legal Name</p><p class="text-sm font-bold text-ajo-black uppercase">${c.firstName} ${c.lastName}</p></div>
                            <div><p class="text-[9px] font-black uppercase text-zinc-400 tracking-widest mb-1">Email Address</p><p class="text-sm font-bold text-ajo-black">${c.email}</p></div>
                            <div><p class="text-[9px] font-black uppercase text-zinc-400 tracking-widest mb-1">Contact Phone</p><p class="text-sm font-bold text-ajo-black">${c.phone || 'N/A'}</p></div>
                            <div><p class="text-[9px] font-black uppercase text-zinc-400 tracking-widest mb-1">Member Segment</p><p class="text-sm font-bold text-ajo-black uppercase">${c.segments?.join(', ') || 'Individual'}</p></div>
                            <div class="md:col-span-2">
                                <p class="text-[9px] font-black uppercase text-zinc-400 tracking-widest mb-1">Registered Address</p><p class="text-sm font-bold text-ajo-black leading-relaxed">${c.address}</p>
                            </div>
                        </div>

                        <div class="mt-12 p-6 bg-ajo-cream/30 border border-ajo-brown/5 rounded-[2rem] flex items-center gap-4 text-left">
                            <div class="w-10 h-10 bg-ajo-brown/10 rounded-xl flex items-center justify-center text-ajo-brown shrink-0 shadow-sm"><i data-lucide="help-circle" size="20"></i></div>
                            <div>
                                <p class="text-[10px] font-black uppercase tracking-widest text-ajo-black italic">Need assistance?</p>
                                <p class="text-[11px] text-zinc-500 mt-1">Please contact <a href="mailto:femiajoplace@gmail.com" class="text-ajo-brown font-bold underline hover:text-ajo-brown-dark">femiajoplace@gmail.com</a> for profile updates.</p>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        function renderClientPlans() {
            const c = state.currentClient;
            const cats = [{id: 'daily', label: 'Daily'}, {id: 'weekly', label: 'Weekly'}, {id: 'monthly', label: 'Monthly'}];
            return `<div class="space-y-14 text-left">${cats.map(cat => {
                const plans = THRIFT_PLANS[cat.id].filter(p => (c.plans || []).includes(p.id));
                if (plans.length === 0) return '';
                return `<div class="space-y-6"><div class="flex items-center gap-3 px-2"><div class="w-1.5 h-6 bg-ajo-brown rounded-full shadow-sm"></div><h3 class="font-black uppercase text-[10px] tracking-[0.2em] text-ajo-black">${cat.label} STATUS</h3></div><div class="bg-white rounded-[2.5rem] border border-zinc-100 shadow-sm overflow-hidden"><div class="ledger-scroll min-w-full"><table class="w-full text-left text-xs whitespace-nowrap"><thead class="bg-zinc-50 text-[9px] font-black uppercase border-b tracking-widest"><tr><th class="px-8 py-5">Plan Context</th><th class="px-8 py-5 text-center text-green-700">Deposited</th><th class="px-8 py-5 text-center">Progress</th><th class="px-8 py-5 text-right">Net Saved</th></tr></thead><tbody class="divide-y divide-zinc-50">${plans.map(p => {
                    const pT = state.transactions.filter(t => t.clientId === c.id && t.planId === p.id);
                    const pI = pT.filter(t => t.type === 'in').reduce((a, b) => a + Number(b.amount), 0);
                    const pO = pT.filter(t => t.type === 'out').reduce((a, b) => a + Number(b.amount), 0);
                    const progress = Math.min(((pI - pO) / p.packValue) * 100, 100);
                    return `<tr class="hover:bg-ajo-cream/10 transition-colors"><td class="px-8 py-6 font-bold text-ajo-black text-sm tracking-tight">${p.label}</td><td class="px-8 py-6 text-center font-black text-green-700">₦${pI.toLocaleString()}</td><td class="px-8 py-6 text-center"><div class="flex items-center justify-center gap-2"><div class="w-12 bg-ajo-cream h-1 rounded-full overflow-hidden shadow-inner"><div class="bg-ajo-brown h-full transition-all duration-1000 shadow-sm" style="width: ${progress}%"></div></div><span class="text-[8px] font-black text-zinc-400">${Math.round(progress)}%</span></div></td><td class="px-8 py-6 text-right font-black text-sm tracking-tighter">₦${(pI - pO).toLocaleString()}</td></tr>`;
                }).join('')}</tbody></table></div></div></div>`;
            }).join('')}</div>`;
        }

        // --- HANDLERS ---
        function attachListeners() {
            const signupForm = document.getElementById('signupForm');
            if (signupForm) signupForm.onsubmit = async (e) => {
                e.preventDefault();
                const plans = Array.from(document.querySelectorAll('input[name="sPlans"]:checked')).map(el => el.value);
                const segments = Array.from(document.querySelectorAll('input[name="sSegments"]:checked')).map(el => el.value);
                if (!plans.length) return alert('Plan required.');
                const emailValue = document.getElementById('sEmail').value;
                const displayId = `FAJ-${new Date().getFullYear()}-${Math.floor(1000 + Math.random() * 9000)}`;
                const clientData = {
                    firstName: document.getElementById('sFirst').value, lastName: document.getElementById('sLast').value,
                    email: emailValue, phone: document.getElementById('sPhone').value,
                    address: document.getElementById('sAddr').value, segments, plans, displayId, createdAt: new Date().toISOString()
                };
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), clientData);
                    await triggerEmails('signup', clientData);
                    state.lastGeneratedId = emailValue;
                    state.showSignupSuccess = true;
                    render();
                } catch (error) { alert("Registration Error: " + error.message); }
            };

            const createForm = document.getElementById('createPortfolioForm');
            if (createForm) createForm.onsubmit = async (e) => {
                e.preventDefault();
                const plans = Array.from(document.querySelectorAll('input[name="cPlans"]:checked')).map(el => el.value);
                const segments = Array.from(document.querySelectorAll('input[name="cSegments"]:checked')).map(el => el.value);
                const displayId = `FAJ-${new Date().getFullYear()}-${Math.floor(1000 + Math.random() * 9000)}`;
                const clientData = {
                    firstName: document.getElementById('cFirst').value, lastName: document.getElementById('cLast').value,
                    email: document.getElementById('cEmail').value, phone: document.getElementById('cPhone').value,
                    address: document.getElementById('cAddr').value, segments, plans, displayId, createdAt: new Date().toISOString()
                };
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), clientData);
                    await triggerEmails('signup', clientData);
                    window.navigateAdmin('clients');
                } catch (error) { alert(error.message); }
            };

            const editForm = document.getElementById('editPortfolioForm');
            if (editForm) editForm.onsubmit = async (e) => {
                e.preventDefault();
                const plans = Array.from(document.querySelectorAll('input[name="cPlans"]:checked')).map(el => el.value);
                const segments = Array.from(document.querySelectorAll('input[name="cSegments"]:checked')).map(el => el.value);
                try {
                    const clientRef = doc(db, 'artifacts', appId, 'public', 'data', 'clients', state.editingClient.id);
                    await updateDoc(clientRef, {
                        firstName: document.getElementById('cFirst').value, lastName: document.getElementById('cLast').value,
                        email: document.getElementById('cEmail').value, phone: document.getElementById('cPhone').value,
                        address: document.getElementById('cAddr').value, segments, plans
                    });
                    state.editingClient = null;
                    window.navigateAdmin('clients');
                } catch (error) { alert(error.message); }
            };

            const transForm = document.getElementById('transForm');
            if (transForm) transForm.onsubmit = async (e) => {
                e.preventDefault();
                const amt = document.getElementById('tAmt').value;
                const client = state.selectedClientForTrans;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'transactions'), {
                        clientId: client.id, clientName: `${client.firstName} ${client.lastName}`,
                        amount: amt, planId: document.getElementById('tPlan').value, 
                        type: currentTransType, date: new Date().toISOString()
                    });
                    await triggerEmails('transaction', { client, amount: amt, type: currentTransType });
                    window.navigateAdmin('history');
                } catch (error) { alert(error.message); }
            };

            const adminForm = document.getElementById('adminLoginForm');
            if (adminForm) adminForm.onsubmit = (e) => { e.preventDefault(); handleAdminLogin(document.getElementById('adminPass').value); };
            const clientForm = document.getElementById('clientLoginForm');
            if (clientForm) clientForm.onsubmit = (e) => { e.preventDefault(); handleClientLogin(document.getElementById('clientId').value); };
            const searchInput = document.getElementById('clientSearch');
            if (searchInput) searchInput.oninput = (e) => { state.clientsSearch = e.target.value; render(); };
        }

        window.onload = initAuth;
    </script>
</body>
</html>
