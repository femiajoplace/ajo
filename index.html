<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Femi Ajo Place | Premium Thrift & Savings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .bg-ajo-black { background-color: #1A1A1A; }
        .text-ajo-brown { color: #8D6E63; }
        .bg-ajo-brown { background-color: #8D6E63; }
        .border-ajo-brown { border-color: #8D6E63; }
        .bg-ajo-brown-dark { background-color: #3E2723; }
        .text-ajo-brown-dark { color: #3E2723; }
        
        [v-cloak] { display: none; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body class="bg-gray-50 text-slate-800 antialiased">

    <div id="app" class="min-h-screen">
        <!-- Content injected by JavaScript -->
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // --- CONSTANTS ---
        const THRIFT_PLANS = {
            daily: [
                { id: 'd1', label: '#150 daily pack #5,250', amount: 150, packValue: 5250 },
                { id: 'd2', label: '#200 daily pack #10,000 section A', amount: 200, packValue: 10000 },
                { id: 'd3', label: '#200 daily pack #10,000 section B', amount: 200, packValue: 10000 },
                { id: 'd4', label: '#200 daily pack #10,000 section C', amount: 200, packValue: 10000 },
                { id: 'd5', label: '#400 daily pack #12,000', amount: 400, packValue: 12000 },
            ],
            weekly: [
                { id: 'w1', label: '#300 every Sundays pack #3000', amount: 300, packValue: 3000 },
                { id: 'w2', label: '#1000 every 3 days pack #20,000', amount: 1000, packValue: 20000 },
                { id: 'w3', label: '#5000 every 5 days pack #80,000', amount: 5000, packValue: 80000 },
            ],
            monthly: [
                { id: 'm1', label: '#10,000 monthly pack #70,000', amount: 10000, packValue: 70000 },
                { id: 'm2', label: '#15,000 monthly pack #90,000', amount: 15000, packValue: 90000 },
                { id: 'm3', label: '#20,000 monthly pack #100,000', amount: 20000, packValue: 100000 },
                { id: 'm4', label: '#20,000 monthly pack #120,000 section A', amount: 20000, packValue: 120000 },
                { id: 'm5', label: '#20,000 monthly pack #120,000 section B', amount: 20000, packValue: 120000 },
                { id: 'm6', label: '#20,000 monthly pack #120,000 section C', amount: 20000, packValue: 120000 },
                { id: 'm7', label: '#30,000 monthly pack #150,000', amount: 30000, packValue: 150000 },
                { id: 'm8', label: '#50,000 monthly pack #300,000 section A', amount: 50000, packValue: 300000 },
                { id: 'm9', label: '#50,000 monthly pack #300,000 section B', amount: 50000, packValue: 300000 },
                { id: 'm10', label: '#60,000 monthly pack #300,000', amount: 60000, packValue: 300000 },
                { id: 'm11', label: '#100,000 monthly pack #500,000', amount: 100000, packValue: 500000 },
                { id: 'm12', label: '#150,000 monthly pack #600,000', amount: 150000, packValue: 600000 },
                { id: 'm13', label: '#200,000 monthly pack #1,000,000', amount: 200000, packValue: 1000000 },
            ]
        };

        const SEGMENTS = ['individual', 'business', 'young_children'];

        // --- APP STATE ---
        let state = {
            view: 'landing', // landing, admin-login, client-login, admin-dash, client-dash
            adminActiveView: 'dashboard', // dashboard, clients, create, history, transaction
            clientActiveView: 'dashboard', // dashboard, my-plans, my-history
            user: null,
            clients: [],
            transactions: [],
            currentClient: null,
            error: '',
            isSidebarOpen: true,
            selectedClientForTrans: null,
            clientsSearch: '',
            sortConfig: { key: 'firstName', direction: 'asc' }
        };

        // --- FIREBASE INIT ---
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = window.__app_id || 'femi-ajo-place-html';

        // --- CORE FUNCTIONS ---

        async function initAuth() {
            const token = window.__initial_auth_token;
            if (token) {
                await signInWithCustomToken(auth, token);
            } else {
                await signInAnonymously(auth);
            }
            onAuthStateChanged(auth, (user) => {
                state.user = user;
                if (user) setupDataListeners();
                render();
            });
        }

        function setupDataListeners() {
            const clientsRef = collection(db, 'artifacts', appId, 'public', 'data', 'clients');
            onSnapshot(clientsRef, (snap) => {
                state.clients = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            });

            const transRef = collection(db, 'artifacts', appId, 'public', 'data', 'transactions');
            onSnapshot(transRef, (snap) => {
                state.transactions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            });
        }

        // --- VIEW HELPERS ---

        function navigate(v) {
            state.view = v;
            state.error = '';
            render();
        }

        function navigateAdmin(v) {
            state.adminActiveView = v;
            render();
        }

        function navigateClient(v) {
            state.clientActiveView = v;
            render();
        }

        function handleLogout() {
            state.view = 'landing';
            state.currentClient = null;
            render();
        }

        function handleAdminLogin(pass) {
            if (pass === 'admin123') {
                state.view = 'admin-dash';
                state.error = '';
            } else {
                state.error = 'Invalid admin credentials.';
            }
            render();
        }

        function handleClientLogin(id) {
            const found = state.clients.find(c => c.displayId === id.toUpperCase());
            if (found) {
                state.currentClient = found;
                state.view = 'client-dash';
                state.error = '';
            } else {
                state.error = 'Client ID not found.';
            }
            render();
        }

        // --- DOM RENDERING ---

        function render() {
            const appDiv = document.getElementById('app');
            let html = '';

            switch (state.view) {
                case 'landing': html = renderLanding(); break;
                case 'admin-login': html = renderAdminLogin(); break;
                case 'client-login': html = renderClientLogin(); break;
                case 'admin-dash': html = renderAdminLayout(); break;
                case 'client-dash': html = renderClientLayout(); break;
            }

            appDiv.innerHTML = html;
            lucide.createIcons();
            attachListeners();
        }

        function renderLanding() {
            return `
                <div class="min-h-screen bg-[#FDFBF9]">
                    <nav class="p-6 flex justify-between items-center border-b bg-white">
                        <div class="flex items-center gap-2">
                            <div class="w-10 h-10 bg-ajo-black rounded-lg flex items-center justify-center font-bold text-white text-xl">F</div>
                            <span class="font-black text-xl">Femi Ajo Place</span>
                        </div>
                        <button onclick="navigate('admin-login')" class="text-sm font-bold text-ajo-brown hover:text-ajo-brown-dark flex items-center gap-2">
                            <i data-lucide="shield-check"></i> Admin
                        </button>
                    </nav>
                    <div class="max-w-6xl mx-auto px-6 py-20 grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
                        <div class="space-y-8">
                            <span class="px-4 py-1.5 bg-ajo-brown/10 text-ajo-brown rounded-full text-xs font-black uppercase tracking-widest">Premium Savings & Thrift</span>
                            <h1 class="text-6xl font-black leading-tight text-ajo-brown-dark">Modern Thrift, <br><span class="text-ajo-brown">Classic Reliability.</span></h1>
                            <p class="text-lg text-zinc-500 max-w-md">Secure, flexible, and high-yield thrift plans tailored for individuals, businesses, and children.</p>
                            <button onclick="navigate('client-login')" class="px-8 py-4 bg-ajo-black text-white rounded-2xl font-bold flex items-center gap-2 hover:scale-105 transition-all shadow-xl">
                                Client Login <i data-lucide="arrow-right"></i>
                            </button>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            ${renderBenefit('wallet', 'Flexible Plans', 'Over 20 savings packages.')}
                            ${renderBenefit('shield-check', 'Secure Assets', 'Verified ledger systems.')}
                            ${renderBenefit('briefcase', 'Business SME', 'Tailored SME support.')}
                            ${renderBenefit('baby', 'Children Future', 'Long term savings.')}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderBenefit(icon, title, desc) {
            return `
                <div class="p-6 bg-white border border-zinc-100 rounded-3xl shadow-sm hover:shadow-md transition-all">
                    <div class="text-ajo-brown mb-4"><i data-lucide="${icon}"></i></div>
                    <h3 class="font-bold text-ajo-brown-dark mb-2">${title}</h3>
                    <p class="text-xs text-zinc-400">${desc}</p>
                </div>
            `;
        }

        function renderAdminLogin() {
            return `
                <div class="min-h-screen bg-ajo-black flex items-center justify-center p-6">
                    <div class="w-full max-w-md bg-white rounded-3xl p-10 shadow-2xl space-y-8">
                        <div class="text-center">
                            <div class="w-16 h-16 bg-ajo-brown-dark rounded-2xl mx-auto flex items-center justify-center text-white mb-4"><i data-lucide="lock" size="32"></i></div>
                            <h2 class="text-2xl font-black text-ajo-brown-dark">Admin Portal</h2>
                            <p class="text-zinc-400 text-sm">Verify identity</p>
                        </div>
                        <form id="adminLoginForm" class="space-y-6">
                            <div class="space-y-1.5">
                                <label class="text-xs font-bold text-zinc-500 uppercase">Password</label>
                                <input type="password" id="adminPass" class="w-full bg-zinc-50 border rounded-xl px-4 py-3 text-sm outline-ajo-brown" required>
                            </div>
                            ${state.error ? `<div class="text-red-600 text-xs font-bold bg-red-50 p-3 rounded-lg border border-red-100">${state.error}</div>` : ''}
                            <button type="submit" class="w-full py-4 bg-ajo-black text-white rounded-xl font-bold hover:bg-black transition-all">Login</button>
                        </form>
                        <button onclick="navigate('landing')" class="w-full text-zinc-400 text-xs font-bold">Back to Home</button>
                    </div>
                </div>
            `;
        }

        function renderClientLogin() {
            return `
                <div class="min-h-screen bg-[#FDFBF9] flex items-center justify-center p-6">
                    <div class="w-full max-w-md bg-white rounded-3xl p-10 shadow-2xl border space-y-8">
                        <div class="text-center">
                            <div class="w-16 h-16 bg-ajo-brown rounded-2xl mx-auto flex items-center justify-center text-white mb-4"><i data-lucide="user-circle" size="32"></i></div>
                            <h2 class="text-2xl font-black text-ajo-brown-dark">Client Login</h2>
                            <p class="text-zinc-400 text-sm">Enter Unique Ajo ID</p>
                        </div>
                        <form id="clientLoginForm" class="space-y-6">
                            <div class="space-y-1.5">
                                <label class="text-xs font-bold text-zinc-500 uppercase">Client ID</label>
                                <input type="text" id="clientId" placeholder="FAJ-202X-XXXX" class="w-full bg-zinc-50 border rounded-xl px-4 py-3 text-sm outline-ajo-brown" required>
                            </div>
                            ${state.error ? `<div class="text-red-600 text-xs font-bold bg-red-50 p-3 rounded-lg border border-red-100">${state.error}</div>` : ''}
                            <button type="submit" class="w-full py-4 bg-ajo-brown text-white rounded-xl font-bold hover:bg-ajo-brown-dark transition-all">Login</button>
                        </form>
                        <button onclick="navigate('landing')" class="w-full text-zinc-400 text-xs font-bold">Back to Home</button>
                    </div>
                </div>
            `;
        }

        function renderAdminLayout() {
            return `
                <div class="flex h-screen overflow-hidden">
                    <aside class="${state.isSidebarOpen ? 'w-64' : 'w-20'} bg-ajo-black text-white transition-all flex flex-col shadow-xl z-20">
                        <div class="p-6 flex items-center gap-3 border-b border-zinc-800">
                            <div class="w-8 h-8 bg-ajo-brown rounded-lg flex items-center justify-center font-bold text-white shrink-0">F</div>
                            ${state.isSidebarOpen ? '<span class="font-bold text-lg">Admin Panel</span>' : ''}
                        </div>
                        <nav class="flex-1 mt-6 px-3 space-y-2">
                            ${renderNavItem('layout-dashboard', 'Dashboard', state.adminActiveView === 'dashboard', () => navigateAdmin('dashboard'))}
                            ${renderNavItem('users', 'Clients', state.adminActiveView === 'clients', () => navigateAdmin('clients'))}
                            ${renderNavItem('plus-circle', 'New Portfolio', state.adminActiveView === 'create', () => navigateAdmin('create'))}
                            ${renderNavItem('history', 'All History', state.adminActiveView === 'history', () => navigateAdmin('history'))}
                        </nav>
                        <div class="p-4 border-t border-zinc-800">
                            <button onclick="handleLogout()" class="w-full py-2 px-3 bg-red-900/20 text-red-200 rounded-md text-xs font-semibold flex items-center justify-center gap-2">
                                <i data-lucide="log-out" size="14"></i> ${state.isSidebarOpen ? 'Sign Out' : ''}
                            </button>
                        </div>
                    </aside>
                    <main class="flex-1 overflow-y-auto bg-gray-50">
                        <header class="sticky top-0 bg-white/80 backdrop-blur-md border-b px-8 py-4 flex justify-between items-center z-10">
                            <div><h1 class="text-xl font-bold text-ajo-brown-dark">Administrator</h1><p class="text-xs text-zinc-500">Managing Portfolios</p></div>
                            <div class="w-10 h-10 rounded-full bg-ajo-brown flex items-center justify-center text-white font-bold">AD</div>
                        </header>
                        <div class="p-8">
                            ${renderAdminView()}
                        </div>
                    </main>
                </div>
            `;
        }

        function renderNavItem(icon, label, active, onclick) {
            const isActive = active ? 'bg-ajo-brown text-white shadow-lg' : 'text-zinc-400 hover:text-white hover:bg-zinc-800';
            return `
                <button onclick="(${onclick})()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${isActive}">
                    <i data-lucide="${icon}" size="20"></i>
                    ${state.isSidebarOpen ? `<span class="font-medium text-sm">${label}</span>` : ''}
                </button>
            `;
        }

        function renderAdminView() {
            switch (state.adminActiveView) {
                case 'dashboard': return renderAdminDashboard();
                case 'clients': return renderAdminClients();
                case 'create': return renderAdminCreate();
                case 'history': return renderAdminHistory();
                case 'transaction': return renderAdminTransaction();
                default: return '';
            }
        }

        function renderAdminDashboard() {
            const totalIn = state.transactions.filter(t => t.type === 'in').reduce((acc, t) => acc + Number(t.amount), 0);
            const totalOut = state.transactions.filter(t => t.type === 'out').reduce((acc, t) => acc + Number(t.amount), 0);
            return `
                <div class="space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        ${renderStat('Total Clients', state.clients.length, 'users', 'Registered portfolios')}
                        ${renderStat('Total Inflow', '₦' + totalIn.toLocaleString(), 'arrow-down-left', 'Successful deposits', 'text-green-500')}
                        ${renderStat('Total Outflow', '₦' + totalOut.toLocaleString(), 'arrow-up-right', 'Payouts', 'text-red-500')}
                    </div>
                    <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                        <div class="p-6 border-b flex justify-between items-center"><h2 class="font-bold">Recent Clients</h2><button onclick="navigateAdmin('clients')" class="text-sm text-ajo-brown font-bold">View All</button></div>
                        <table class="w-full text-left text-sm">
                            <thead class="bg-zinc-50 text-[10px] uppercase font-black text-zinc-400">
                                <tr><th class="px-6 py-4">ID</th><th class="px-6 py-4">Name</th><th class="px-6 py-4">Action</th></tr>
                            </thead>
                            <tbody class="divide-y">
                                ${state.clients.slice(-5).reverse().map(c => `
                                    <tr>
                                        <td class="px-6 py-4 font-mono font-bold text-ajo-brown">${c.displayId}</td>
                                        <td class="px-6 py-4 font-bold">${c.firstName} ${c.lastName}</td>
                                        <td class="px-6 py-4"><button onclick="recordTransactionFor('${c.id}')" class="text-ajo-brown font-black text-[10px] uppercase">Record Pay</button></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderStat(label, val, icon, sub, colorClass = '') {
            return `
                <div class="bg-white p-6 rounded-3xl border shadow-sm flex items-start gap-4">
                    <div class="w-12 h-12 bg-zinc-50 rounded-2xl flex items-center justify-center text-ajo-brown"><i data-lucide="${icon}"></i></div>
                    <div><p class="text-zinc-400 font-bold uppercase text-[9px] mb-1">${label}</p><h4 class="text-2xl font-black ${colorClass}">${val}</h4><p class="text-[10px] text-zinc-400">${sub}</p></div>
                </div>
            `;
        }

        window.recordTransactionFor = function(id) {
            state.selectedClientForTrans = state.clients.find(c => c.id === id);
            navigateAdmin('transaction');
        }

        function renderAdminClients() {
            return `
                <div class="space-y-10">
                    <div class="flex justify-between items-center">
                        <div><h2 class="text-2xl font-black text-ajo-brown-dark">Portfolios</h2><p class="text-sm text-zinc-500">Categorized plan management</p></div>
                        <input type="text" id="clientSearch" value="${state.clientsSearch}" placeholder="Search ID/Name..." class="bg-white border rounded-xl px-4 py-2 text-sm outline-ajo-brown w-64">
                    </div>
                    ${renderAdminClientCategory('daily')}
                    ${renderAdminClientCategory('weekly')}
                    ${renderAdminClientCategory('monthly')}
                </div>
            `;
        }

        function renderAdminClientCategory(catId) {
            const filtered = state.clients.filter(c => {
                const hasPlan = c.plans.some(pId => THRIFT_PLANS[catId].some(p => p.id === pId));
                const match = !state.clientsSearch || 
                              (c.firstName + ' ' + c.lastName).toLowerCase().includes(state.clientsSearch.toLowerCase()) ||
                              c.displayId.toLowerCase().includes(state.clientsSearch.toLowerCase());
                return hasPlan && match;
            });

            return `
                <div class="space-y-4">
                    <h3 class="font-black uppercase text-xs text-ajo-brown flex items-center gap-2"><div class="w-1.5 h-4 bg-ajo-brown rounded-full"></div> ${catId} Thrift Records (${filtered.length})</h3>
                    <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                        <table class="w-full text-left text-xs">
                            <thead class="bg-zinc-50 text-[9px] uppercase font-black text-zinc-400">
                                <tr>
                                    <th class="px-6 py-4">ID</th><th class="px-6 py-4">Name</th><th class="px-6 py-4">In (₦)</th><th class="px-6 py-4">Out (₦)</th><th class="px-6 py-4 text-right">Action</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y">
                                ${filtered.map(c => {
                                    const cTrans = state.transactions.filter(t => t.clientId === c.id);
                                    const catPlans = THRIFT_PLANS[catId].filter(p => c.plans.includes(p.id));
                                    const totalIn = cTrans.filter(t => t.type === 'in' && catPlans.some(p => p.id === t.planId)).reduce((a, b) => a + Number(b.amount), 0);
                                    const totalOut = cTrans.filter(t => t.type === 'out' && catPlans.some(p => p.id === t.planId)).reduce((a, b) => a + Number(b.amount), 0);
                                    return `
                                        <tr>
                                            <td class="px-6 py-4 font-mono font-bold text-ajo-brown">${c.displayId}</td>
                                            <td class="px-6 py-4"><div class="font-bold">${c.firstName} ${c.lastName}</div><div class="text-[9px] text-zinc-400">${c.phone}</div></td>
                                            <td class="px-6 py-4 text-green-600 font-bold">${totalIn.toLocaleString()}</td>
                                            <td class="px-6 py-4 text-red-600 font-bold">${totalOut.toLocaleString()}</td>
                                            <td class="px-6 py-4 text-right"><button onclick="recordTransactionFor('${c.id}')" class="px-2 py-1 bg-ajo-brown/10 text-ajo-brown rounded font-black uppercase text-[9px]">Record</button></td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderAdminCreate() {
            return `
                <form id="createPortfolioForm" class="max-w-4xl mx-auto bg-white p-8 rounded-3xl shadow-lg border space-y-10">
                    <h2 class="text-2xl font-bold text-ajo-brown-dark">Create Portfolio</h2>
                    <div class="grid grid-cols-2 gap-6">
                        <div class="space-y-1"><label class="text-[10px] font-black uppercase text-zinc-400">First Name</label><input type="text" id="cFirst" class="w-full bg-zinc-50 border rounded-xl px-4 py-2 text-sm outline-ajo-brown" required></div>
                        <div class="space-y-1"><label class="text-[10px] font-black uppercase text-zinc-400">Last Name</label><input type="text" id="cLast" class="w-full bg-zinc-50 border rounded-xl px-4 py-2 text-sm outline-ajo-brown" required></div>
                        <div class="space-y-1"><label class="text-[10px] font-black uppercase text-zinc-400">Email</label><input type="email" id="cEmail" class="w-full bg-zinc-50 border rounded-xl px-4 py-2 text-sm outline-ajo-brown" required></div>
                        <div class="space-y-1"><label class="text-[10px] font-black uppercase text-zinc-400">Phone</label><input type="text" id="cPhone" class="w-full bg-zinc-50 border rounded-xl px-4 py-2 text-sm outline-ajo-brown" required></div>
                        <div class="col-span-2 space-y-1"><label class="text-[10px] font-black uppercase text-zinc-400">Address</label><input type="text" id="cAddr" class="w-full bg-zinc-50 border rounded-xl px-4 py-2 text-sm outline-ajo-brown" required></div>
                    </div>
                    
                    <div class="space-y-4">
                        <h3 class="font-bold text-xs uppercase">1. Customer Segments</h3>
                        <div class="flex gap-4">
                            ${SEGMENTS.map(s => `
                                <label class="flex items-center gap-2 cursor-pointer p-3 border rounded-xl hover:bg-ajo-brown/5">
                                    <input type="checkbox" name="segments" value="${s}" class="accent-ajo-brown">
                                    <span class="text-sm font-bold capitalize">${s.replace('_', ' ')}</span>
                                </label>
                            `).join('')}
                        </div>
                    </div>

                    <div class="space-y-6">
                        <h3 class="font-bold text-xs uppercase">2. Thrift Plans</h3>
                        ${['daily', 'weekly', 'monthly'].map(cat => `
                            <div class="space-y-2">
                                <h4 class="text-[9px] font-black uppercase text-ajo-brown">${cat} Packs</h4>
                                <div class="grid grid-cols-2 gap-2">
                                    ${THRIFT_PLANS[cat].map(p => `
                                        <label class="flex items-start gap-2 p-3 border rounded-xl cursor-pointer hover:bg-ajo-brown/5">
                                            <input type="checkbox" name="plans" value="${p.id}" class="accent-ajo-brown mt-1">
                                            <span class="text-[10px] font-bold">${p.label}</span>
                                        </label>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <button type="submit" id="submitPortfolio" class="w-full py-4 bg-ajo-black text-white rounded-xl font-bold shadow-xl">Generate Portfolio & ID</button>
                </form>
            `;
        }

        function renderAdminTransaction() {
            const c = state.selectedClientForTrans;
            if (!c) return '';
            const cPlans = [...THRIFT_PLANS.daily, ...THRIFT_PLANS.weekly, ...THRIFT_PLANS.monthly].filter(p => c.plans.includes(p.id));
            return `
                <div class="max-w-xl mx-auto bg-white p-8 rounded-3xl shadow-xl border relative">
                    <button onclick="navigateAdmin('clients')" class="absolute top-6 right-6 text-zinc-400"><i data-lucide="x"></i></button>
                    <h2 class="text-2xl font-bold text-ajo-brown-dark">Record Pay</h2>
                    <p class="text-ajo-brown font-mono text-sm mb-8">${c.displayId} — ${c.firstName}</p>
                    
                    <form id="transForm" class="space-y-6">
                        <div class="flex bg-zinc-100 p-1 rounded-xl">
                            <button type="button" onclick="setTransType('in')" id="typeIn" class="flex-1 py-2 rounded-lg font-bold text-sm bg-white text-green-600 shadow-sm">Pay-In</button>
                            <button type="button" onclick="setTransType('out')" id="typeOut" class="flex-1 py-2 rounded-lg font-bold text-sm text-zinc-500">Pay-Out</button>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-1"><label class="text-[9px] font-black uppercase">Amount (₦)</label><input type="number" id="tAmt" class="w-full bg-zinc-50 border rounded-xl px-4 py-2 text-sm outline-ajo-brown" required></div>
                            <div class="space-y-1"><label class="text-[9px] font-black uppercase">Plan</label>
                                <select id="tPlan" class="w-full bg-zinc-50 border rounded-xl px-4 py-2 text-sm outline-ajo-brown" required>
                                    <option value="">Choose...</option>
                                    ${cPlans.map(p => `<option value="${p.id}">${p.label}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[9px] font-black uppercase">Attach Proof</label>
                            <div class="border-2 border-dashed rounded-xl p-8 bg-zinc-50 text-center">
                                <i data-lucide="file-text" class="mx-auto text-zinc-300 mb-2"></i>
                                <input type="file" id="tProof" class="text-[10px] mx-auto">
                            </div>
                        </div>
                        <button type="submit" class="w-full py-4 bg-ajo-brown text-white rounded-xl font-bold shadow-xl">Confirm Transaction</button>
                    </form>
                </div>
            `;
        }

        let currentTransType = 'in';
        window.setTransType = function(t) {
            currentTransType = t;
            document.getElementById('typeIn').className = t === 'in' ? 'flex-1 py-2 rounded-lg font-bold text-sm bg-white text-green-600 shadow-sm' : 'flex-1 py-2 rounded-lg font-bold text-sm text-zinc-500';
            document.getElementById('typeOut').className = t === 'out' ? 'flex-1 py-2 rounded-lg font-bold text-sm bg-white text-red-600 shadow-sm' : 'flex-1 py-2 rounded-lg font-bold text-sm text-zinc-500';
        }

        function renderAdminHistory() {
            return `<div class="animate-in fade-in duration-500">${renderHistoryTable(state.transactions)}</div>`;
        }

        function renderHistoryTable(transactions, filterClientId = null) {
            const sorted = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));
            return `
                <div class="space-y-6">
                    <h2 class="text-2xl font-black text-ajo-brown-dark">Transaction Ledger</h2>
                    <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-zinc-50 text-[10px] font-black uppercase text-zinc-400">
                                <tr><th class="px-6 py-4">Timestamp</th>${!filterClientId ? '<th class="px-6 py-4">Client</th>' : ''}<th class="px-6 py-4">Type</th><th class="px-6 py-4">Amount</th><th class="px-6 py-4 text-right">Proof</th></tr>
                            </thead>
                            <tbody class="divide-y text-xs">
                                ${sorted.map(t => `
                                    <tr>
                                        <td class="px-6 py-4 text-zinc-500">${new Date(t.date).toLocaleDateString()}</td>
                                        ${!filterClientId ? `<td class="px-6 py-4 font-bold">${t.clientName}</td>` : ''}
                                        <td class="px-6 py-4"><span class="px-2 py-0.5 rounded-full font-black uppercase text-[9px] ${t.type === 'in' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${t.type}</span></td>
                                        <td class="px-6 py-4 font-bold">₦${Number(t.amount).toLocaleString()}</td>
                                        <td class="px-6 py-4 text-right">${t.proofAttached ? '<span class="text-ajo-brown border border-ajo-brown px-2 py-1 rounded">RECEIPT</span>' : '<span class="text-zinc-300">None</span>'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        // --- CLIENT LAYOUT ---

        function renderClientLayout() {
            const c = state.currentClient;
            return `
                <div class="flex h-screen overflow-hidden">
                    <aside class="${state.isSidebarOpen ? 'w-64' : 'w-20'} bg-ajo-black text-white transition-all flex flex-col shadow-xl z-20">
                        <div class="p-6 flex items-center gap-3 border-b border-zinc-800">
                            <div class="w-8 h-8 bg-ajo-brown rounded-lg flex items-center justify-center font-bold text-white shrink-0">F</div>
                            ${state.isSidebarOpen ? '<span class="font-bold text-lg">Member Area</span>' : ''}
                        </div>
                        <nav class="flex-1 mt-6 px-3 space-y-2">
                            ${renderNavItem('layout-dashboard', 'Dashboard', state.clientActiveView === 'dashboard', () => navigateClient('dashboard'))}
                            ${renderNavItem('file-text', 'My Thrift Plans', state.clientActiveView === 'my-plans', () => navigateClient('my-plans'))}
                            ${renderNavItem('history', 'My History', state.clientActiveView === 'my-history', () => navigateClient('my-history'))}
                        </nav>
                        <div class="p-4 border-t border-zinc-800">
                            <button onclick="handleLogout()" class="w-full py-2 px-3 bg-red-900/20 text-red-200 rounded-md text-xs font-semibold flex items-center justify-center gap-2">
                                <i data-lucide="log-out" size="14"></i> ${state.isSidebarOpen ? 'Sign Out' : ''}
                            </button>
                        </div>
                    </aside>
                    <main class="flex-1 overflow-y-auto bg-gray-50">
                        <header class="sticky top-0 bg-white/80 backdrop-blur-md border-b px-8 py-4 flex justify-between items-center z-10">
                            <div><h1 class="text-xl font-bold text-ajo-brown-dark">Welcome back</h1><p class="text-xs text-zinc-500">${c.firstName} ${c.lastName} (${c.displayId})</p></div>
                            <div class="w-10 h-10 rounded-full bg-ajo-brown flex items-center justify-center text-white font-bold">${c.firstName[0]}</div>
                        </header>
                        <div class="p-8">
                            ${renderClientView()}
                        </div>
                    </main>
                </div>
            `;
        }

        function renderClientView() {
            switch (state.clientActiveView) {
                case 'dashboard': return renderClientDashboard();
                case 'my-plans': return renderClientPlans();
                case 'my-history': return renderHistoryTable(state.transactions.filter(t => t.clientId === state.currentClient.id), state.currentClient.id);
                default: return '';
            }
        }

        function renderClientDashboard() {
            const c = state.currentClient;
            const cTrans = state.transactions.filter(t => t.clientId === c.id);
            const totalIn = cTrans.filter(t => t.type === 'in').reduce((a, b) => a + Number(b.amount), 0);
            const totalOut = cTrans.filter(t => t.type === 'out').reduce((a, b) => a + Number(b.amount), 0);
            return `
                <div class="space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-ajo-black p-8 rounded-3xl text-white relative overflow-hidden shadow-2xl">
                           <div class="absolute top-0 right-0 p-4 opacity-10"><i data-lucide="credit-card" size="120"></i></div>
                           <p class="text-zinc-400 font-bold uppercase text-[9px] mb-1">Total Balance</p>
                           <h3 class="text-4xl font-bold mb-6">₦${(totalIn - totalOut).toLocaleString()}</h3>
                           <div class="flex gap-4"><div class="px-3 py-1 bg-white/10 rounded-full text-[10px] font-bold uppercase">${c.displayId}</div><div class="px-3 py-1 bg-ajo-brown rounded-full text-[10px] font-bold uppercase">${c.plans.length} Active</div></div>
                        </div>
                        <div class="bg-white p-8 rounded-3xl border flex flex-col justify-between">
                            <h4 class="font-bold text-ajo-brown-dark">Details</h4>
                            <div class="grid grid-cols-2 gap-4 text-xs mt-4">
                                <div><p class="text-zinc-400 font-bold text-[9px] uppercase">Phone</p><p class="font-bold">${c.phone}</p></div>
                                <div><p class="text-zinc-400 font-bold text-[9px] uppercase">Member Segment</p><p class="font-bold uppercase">${c.segments.join(' / ')}</p></div>
                                <div class="col-span-2"><p class="text-zinc-400 font-bold text-[9px] uppercase">Address</p><p class="truncate">${c.address}</p></div>
                            </div>
                        </div>
                    </div>
                    ${renderClientPlans()}
                </div>
            `;
        }

        function renderClientPlans() {
            const c = state.currentClient;
            const cTrans = state.transactions.filter(t => t.clientId === c.id);
            const cats = [{id: 'daily', label: 'Daily Packs'}, {id: 'weekly', label: 'Weekly Cycles'}, {id: 'monthly', label: 'Monthly Contributions'}];
            
            return `
                <div class="space-y-10">
                    ${cats.map(cat => {
                        const plans = THRIFT_PLANS[cat.id].filter(p => c.plans.includes(p.id));
                        if (plans.length === 0) return '';
                        return `
                            <section class="space-y-4">
                                <h3 class="font-bold text-zinc-800 flex items-center gap-2"><div class="w-1.5 h-4 bg-ajo-brown rounded-full"></div> ${cat.label}</h3>
                                <div class="bg-white rounded-2xl border overflow-x-auto">
                                    <table class="w-full text-left min-w-[700px] text-xs">
                                        <thead class="bg-zinc-50 text-[9px] font-black uppercase text-zinc-400 border-b">
                                            <tr><th class="px-6 py-4">Package</th><th class="px-6 py-4">Unit</th><th class="px-6 py-4">Target</th><th class="px-6 py-4 text-green-600">Total In</th><th class="px-6 py-4 text-red-600">Total Out</th><th class="px-6 py-4">Progress</th><th class="px-6 py-4 text-right">Net</th></tr>
                                        </thead>
                                        <tbody class="divide-y">
                                            ${plans.map(p => {
                                                const pTrans = cTrans.filter(t => t.planId === p.id);
                                                const pIn = pTrans.filter(t => t.type === 'in').reduce((a, b) => a + Number(b.amount), 0);
                                                const pOut = pTrans.filter(t => t.type === 'out').reduce((a, b) => a + Number(b.amount), 0);
                                                const progress = Math.min(((pIn - pOut) / p.packValue) * 100, 100);
                                                return `
                                                    <tr>
                                                        <td class="px-6 py-4 font-bold text-ajo-brown-dark">${p.label}</td>
                                                        <td class="px-6 py-4">₦${p.amount.toLocaleString()}</td>
                                                        <td class="px-6 py-4 font-bold text-ajo-brown">₦${p.packValue.toLocaleString()}</td>
                                                        <td class="px-6 py-4 text-green-700 font-bold">₦${pIn.toLocaleString()}</td>
                                                        <td class="px-6 py-4 text-red-700 font-bold">₦${pOut.toLocaleString()}</td>
                                                        <td class="px-6 py-4"><div class="w-16 bg-zinc-100 h-1 rounded-full overflow-hidden"><div class="bg-ajo-brown h-full" style="width: ${progress}%"></div></div></td>
                                                        <td class="px-6 py-4 text-right font-black">₦${(pIn - pOut).toLocaleString()}</td>
                                                    </tr>
                                                `;
                                            }).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </section>
                        `;
                    }).join('')}
                </div>
            `;
        }

        // --- EVENT LISTENERS ---

        function attachListeners() {
            const adminForm = document.getElementById('adminLoginForm');
            if (adminForm) adminForm.onsubmit = (e) => { e.preventDefault(); handleAdminLogin(document.getElementById('adminPass').value); };

            const clientForm = document.getElementById('clientLoginForm');
            if (clientForm) clientForm.onsubmit = (e) => { e.preventDefault(); handleClientLogin(document.getElementById('clientId').value); };

            const searchInput = document.getElementById('clientSearch');
            if (searchInput) searchInput.oninput = (e) => { state.clientsSearch = e.target.value; render(); };

            const createForm = document.getElementById('createPortfolioForm');
            if (createForm) createForm.onsubmit = async (e) => {
                e.preventDefault();
                const segments = Array.from(document.querySelectorAll('input[name="segments"]:checked')).map(el => el.value);
                const plans = Array.from(document.querySelectorAll('input[name="plans"]:checked')).map(el => el.value);
                if (!segments.length || !plans.length) return alert('Select segments and plans.');
                
                const displayId = `FAJ-${new Date().getFullYear()}-${Date.now().toString().slice(-4)}`;
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), {
                    firstName: document.getElementById('cFirst').value,
                    lastName: document.getElementById('cLast').value,
                    email: document.getElementById('cEmail').value,
                    phone: document.getElementById('cPhone').value,
                    address: document.getElementById('cAddr').value,
                    segments, plans, displayId, createdAt: new Date().toISOString()
                });
                navigateAdmin('clients');
            };

            const transForm = document.getElementById('transForm');
            if (transForm) transForm.onsubmit = async (e) => {
                e.preventDefault();
                const amount = document.getElementById('tAmt').value;
                const planId = document.getElementById('tPlan').value;
                const proof = document.getElementById('tProof').files[0];
                
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'transactions'), {
                    clientId: state.selectedClientForTrans.id,
                    clientName: `${state.selectedClientForTrans.firstName} ${state.selectedClientForTrans.lastName}`,
                    amount, planId, type: currentTransType,
                    date: new Date().toISOString(),
                    proofAttached: !!proof
                });
                navigateAdmin('history');
            };
        }

        // START APP
        window.onload = initAuth;
        window.navigate = navigate;
        window.navigateAdmin = navigateAdmin;
        window.navigateClient = navigateClient;
        window.handleLogout = handleLogout;

    </script>
</body>
</html>
