        const firebaseConfig = {
            apiKey: "AIzaSyCrn5fdt8n_RmPZmcnxzZsHgV6oqPIY-9o",

        // --- STATE ---
        let state = {

        let db, auth;

        // --- HELPER FUNCTIONS ---
        window.showToast = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            const bg = type === 'success' ? 'bg-ajo-black text-white' : 'bg-red-600 text-white';
            const icon = type === 'success' ? 'check-circle' : 'alert-circle';
            
            toast.className = `px-6 py-4 rounded-2xl ${bg} shadow-2xl flex items-center gap-4 animate-slide-up min-w-[300px] border border-white/10`;
            toast.innerHTML = `<i data-lucide="${icon}" size="18"></i><span class="text-xs font-bold uppercase tracking-widest">${message}</span>`;
            
            container.appendChild(toast);
            lucide.createIcons();
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px)';
                setTimeout(() => toast.remove(), 400);
            }, 3500);
        };

        window.navigate = (v) => {
            state.view = v;
            state.error = '';
            state.mobileSidebarOpen = false;
            state.landingMenuOpen = false;
            state.showSignupSuccess = false; 
            render();
            window.scrollTo(0, 0);
        };

        window.navigateAdmin = (v) => { 
            state.adminActiveView = v; 
            state.mobileSidebarOpen = false; 
            if (v !== 'transaction') {
                state.editingTransaction = null;
            }
            render(); 
        };
        window.navigateClient = (v) => { state.clientActiveView = v; state.mobileSidebarOpen = false; render(); };
        window.toggleMobileSidebar = () => { 
            state.mobileSidebarOpen = !state.mobileSidebarOpen; 
            render();
        };
        window.toggleLandingMenu = () => { state.landingMenuOpen = !state.landingMenuOpen; render(); };
        window.viewProof = (dataUrl) => { state.viewingProof = dataUrl; render(); };
        window.closeProof = () => { state.viewingProof = null; render(); };
        window.scrollToContact = () => {
            state.landingMenuOpen = false;
            state.mobileSidebarOpen = false;
            render();
            // Wait for DOM to update after potential render call
            setTimeout(() => {
                document.getElementById('contact-section')?.scrollIntoView({ behavior: 'smooth' });
            }, 100);
        };

        window.handleLogout = async () => {
            if (state.user) {
                const sessionRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'session', 'current');
                await deleteDoc(sessionRef);
            }
            state.view = 'landing';
            state.currentClient = null;
            state.mobileSidebarOpen = false;
            showToast('Logged out successfully');

        };

        window.setTransType = (type) => {
            state.currentTransType = type;
            render();
        };

        function generateNextMemberId() {
            const currentYear = new Date().getFullYear();
            const prefix = `FAJ-${currentYear}-`;
            const yearClients = state.clients.filter(c => c.displayId && c.displayId.startsWith(prefix));
            let nextNum = 1;
            if (yearClients.length > 0) {
                const serials = yearClients.map(c => {
                    const parts = c.displayId.split('-');
                    const num = parseInt(parts[parts.length - 1], 10);
                    return isNaN(num) ? 0 : num;
                });
                nextNum = Math.max(...serials) + 1;
            }
            const paddedSerial = nextNum.toString().padStart(4, '0');
            return `${prefix}${paddedSerial}`;
        }

        function validatePasswordPolicy(password) {
            if (password.length < 8 || password.length > 32) throw new Error("Password must be 8-32 characters.");
            if (!/[A-Z]/.test(password)) throw new Error("Password needs an uppercase letter.");
            if (!/[a-z]/.test(password)) throw new Error("Password needs a lowercase letter.");
            if (!/\d/.test(password)) throw new Error("Password needs a number.");
            if (!/[!@#$%^&*(),.?":{}|<>]/.test(password)) throw new Error("Password needs a special character.");
            return true;
        }

        // --- EXPORT LOGIC ---
        window.exportLedgerCSV = () => {
            const isClient = state.view === 'client-dash';
            const transactions = isClient 
                ? state.transactions.filter(t => t.clientId === state.currentClient.id)
                : state.transactions;

            if (transactions.length === 0) { showToast("No ledger records to export", "error"); return; }
            const isAdmin = state.view === 'admin-dash';
            const allPlans = [...THRIFT_PLANS.daily, ...THRIFT_PLANS.weekly, ...THRIFT_PLANS.monthly, ...state.customPlans.daily, ...state.customPlans.weekly, ...state.customPlans.monthly];
            const headers = ["Timestamp", isAdmin ? "Member" : null, "Type", "Plan", "Value (N)"].filter(Boolean);
            
            const rows = transactions.map(t => {
                const date = new Date(t.date).toLocaleDateString() + ' ' + new Date(t.date).toLocaleTimeString();
                const plan = allPlans.find(p => p.id === t.planId)?.label || t.planId;
                return [
                    `"${date}"`,
                    isAdmin ? `"${t.clientName}"` : null,
                    `"${t.type === 'in' ? 'Deposit' : 'Withdrawal'}"`,
                    `"${plan}"`,
                    t.amount
                ].filter(val => val !== null);
            });

            const csvContent = "data:text/csv;charset=utf-8," + headers.join(",") + "\n" + rows.map(e => e.join(",")).join("\n");
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            const fileName = isAdmin ? `FemiAjo_MasterLedger_${new Date().toISOString().split('T')[0]}.csv` : `FemiAjo_MyLedger_${state.currentClient.displayId}.csv`;
            link.setAttribute("download", fileName);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast("CSV Exported successfully");
        };

        window.exportLedgerPDF = () => {
            const isClient = state.view === 'client-dash';
            const transactions = isClient 
                ? state.transactions.filter(t => t.clientId === state.currentClient.id)
                : state.transactions;

            if (transactions.length === 0) { showToast("No ledger records to export", "error"); return; }
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const isAdmin = state.view === 'admin-dash';
            const title = isAdmin ? "FEMI AJO PLACE - MASTER LEDGER" : `FEMI AJO PLACE - PORTFOLIO LEDGER (${state.currentClient.displayId})`;
            const userSub = isAdmin ? "System Administrator Report" : `Report for: ${state.currentClient.firstName} ${state.currentClient.lastName}`;
            const allPlans = [...THRIFT_PLANS.daily, ...THRIFT_PLANS.weekly, ...THRIFT_PLANS.monthly, ...state.customPlans.daily, ...state.customPlans.weekly, ...state.customPlans.monthly];

            doc.setFontSize(18);
            doc.setTextColor(15, 15, 15);
            doc.text(title, 14, 22);
            
            doc.setFontSize(10);
            doc.setTextColor(100);
            doc.text(userSub, 14, 30);
            doc.text(`Generated on: ${new Date().toLocaleString()}`, 14, 35);

            const tableHeaders = [["Date", isAdmin ? "Member" : "Plan", "Type", "Amount (N)"]];
            const tableData = transactions.sort((a, b) => new Date(b.date) - new Date(a.date)).map(t => {
                const plan = allPlans.find(p => p.id === t.planId)?.label || t.planId;
                return [
                    new Date(t.date).toLocaleDateString(),
                    isAdmin ? t.clientName : plan,
                    t.type === 'in' ? 'Deposit' : 'Withdrawal',
                    Number(t.amount).toLocaleString()
                ];
            });

            doc.autoTable({
                startY: 45,
                head: tableHeaders,
                body: tableData,
                theme: 'striped',
                headStyles: { fillColor: [15, 15, 15], textColor: [255, 255, 255], fontSize: 10, fontStyle: 'bold' },
                styles: { fontSize: 9, cellPadding: 4 },
                columnStyles: { 3: { halign: 'right' } }
            });

            const fileName = isAdmin ? `FemiAjo_MasterLedger_${Date.now()}.pdf` : `FemiAjo_MyLedger_${state.currentClient.displayId}.pdf`;
            doc.save(fileName);
            showToast("PDF Generated successfully");
        };

        // --- CORE LOGIC ---
        async function initApp() {
            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);

                const customToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
                
                try {
                    if (customToken) await signInWithCustomToken(auth, customToken);
                    else await signInAnonymously(auth);
                } catch (authErr) {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, async (user) => {
                    state.user = user;
                    if (user) {
                        await bootstrapAdmin();
                        setupRealtimeListeners();
                        await checkPersistentSession(user);
                    } else {
                        state.isCheckingSession = false;
                        render();
                    }
                });

                emailjs.init(EMAILJS_PUBLIC_KEY);
            } catch (err) {
                console.error("Critical Connection Error:", err);
                state.view = 'landing';
                state.error = "Ledger Connection Failed.";
                render();
            }
        }

        async function bootstrapAdmin() {
            if (!state.user) return;
            const adminDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'admin_access');
            const snap = await getDoc(adminDocRef);
            if (snap.exists()) {
                state.adminCreds = snap.data().password;
            } else {
                state.adminCreds = null;
            }
        }

        async function checkPersistentSession(user) {
            const sessionRef = doc(db, 'artifacts', appId, 'users', user.uid, 'session', 'current');
            const snap = await getDoc(sessionRef);
            if (snap.exists()) {
                const sessionData = snap.data();
                if (sessionData.type === 'admin') state.view = 'admin-dash';
                else if (sessionData.type === 'client') {
                    const clientSnap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'clients', sessionData.clientId));
                    if (clientSnap.exists()) {
                        state.currentClient = { id: clientSnap.id, ...clientSnap.data() };
                        state.view = 'client-dash';
                    }
                }
            }
            state.isCheckingSession = false;
            render();
        }

        function setupRealtimeListeners() {
            if (!state.user) return;
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), (snap) => {
                state.clients = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (state.currentClient) {
                    const fresh = state.clients.find(c => c.id === state.currentClient.id);
                    if (fresh) state.currentClient = fresh;
                }
                render();
            });

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'transactions'), (snap) => {
                state.transactions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            });

            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'admin_access'), (snap) => {
                if (snap.exists()) state.adminCreds = snap.data().password;
            });

            // Listen for custom classifications and plans
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'custom_settings'), (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    state.customSegments = data.segments || [];
                    state.customPlans = data.plans || { daily: [], weekly: [], monthly: [] };
                    render();
                }
            });
        }

        async function triggerEmails(type, data) {
            try {
                if (type === 'signup') {
                    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_SIGNUP_TEMPLATE, {
                        client_id: data.displayId,
                        to_email: data.email,
                        to_name: data.firstName
                    });
                } else if (type === 'transaction') {
                    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TRANS_TEMPLATE, {
                        name: data.client.firstName,
                        transaction_type: data.type === 'in' ? 'Deposit' : 'Withdrawal',
                        amount: `₦${Number(data.amount).toLocaleString()}`,
                        to_email: data.client.email
                    });
                } else if (type === 'edit_transaction') {
                    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TRANS_TEMPLATE, {
                        name: data.client.firstName,
                        transaction_type: `MODIFIED LEDGER RECORD: ${data.type === 'in' ? 'Deposit' : 'Withdrawal'}`,
                        amount: `₦${Number(data.amount).toLocaleString()} (Entry Adjusted by Admin)`,
                        to_email: data.client.email
                    });
                } else if (type === 'delete_transaction') {
                    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TRANS_TEMPLATE, {
                        name: data.client.firstName,
                        transaction_type: `DELETED RECORD: ${data.type === 'in' ? 'Deposit' : 'Withdrawal'}`,
                        amount: `₦${Number(data.amount).toLocaleString()} (Entry Removed by Admin)`,
                        to_email: data.client.email
                    });
                } else if (type === 'password_change') {
                    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TRANS_TEMPLATE, {
                        name: data.firstName,
                        transaction_type: "SECURITY ALERT: Access Credentials Updated",
                        amount: "Your portfolio access password was recently modified. If you did not authorize this change, please contact support immediately to secure your account.",
                        to_email: data.email
                    });
                }
            } catch (e) { console.error("Email failed", e); }
        }

        // --- RENDER ENGINE ---
        function render() {
            const root = document.getElementById('app');
            if (!root) return;

            if (state.isCheckingSession) {
                root.innerHTML = `
                    <div class="flex items-center justify-center h-screen bg-ajo-black text-white text-center">
                        <div class="space-y-6">
                            <div class="relative w-16 h-16 mx-auto">
                                <div class="absolute inset-0 border-4 border-ajo-brown/20 rounded-full"></div>
                                <div class="absolute inset-0 border-4 border-ajo-brown rounded-full border-t-transparent animate-spin"></div>
                            </div>
                            <div>
                                <h2 class="text-xs font-black uppercase tracking-[0.4em] text-ajo-brown">Femi Ajo Place</h2>
                                <p class="text-zinc-500 font-bold tracking-widest text-[10px] uppercase mt-2">Connecting to Secure Ledger...</p>
                            </div>
                        </div>
                    </div>`;
                return;
            }

            let content = '';
            switch (state.view) {
                case 'landing': content = renderLanding(); break;
                case 'signup': content = renderSignup(); break;
                case 'admin-login': content = renderAuthForm('admin'); break;
                case 'client-login': content = renderAuthForm('client'); break;
                case 'admin-dash': content = renderDashboard('admin'); break;
                case 'client-dash': content = renderDashboard('client'); break;
            }

            if (state.showSignupSuccess) content += renderSuccessModal();
            if (state.viewingProof) content += renderProofViewer();
            if (state.transactionToDelete) content += renderDeleteConfirmation();

            root.innerHTML = content;
            lucide.createIcons();
            attachDomEvents();
        }

        window.addCustomClassification = async () => {
            const input = document.getElementById('newSegmentInput');
            const val = input.value.trim();
            if (!val) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'custom_settings');
                const updatedSegments = [...state.customSegments, val];
                await setDoc(docRef, { segments: updatedSegments }, { merge: true });
                input.value = '';
                showToast("Classification added");
            } catch (err) { showToast("Failed to add", "error"); }
        };

        window.submitCustomPlan = async () => {
            const freq = document.getElementById('cpFreq').value.trim().toLowerCase();
            const label = document.getElementById('cpLabel').value.trim();
            const amt = Number(document.getElementById('cpAmt').value);
            const pack = Number(document.getElementById('cpPack').value);

            if (!['daily', 'weekly', 'monthly'].includes(freq)) { showToast("Frequency must be daily, weekly, or monthly", "error"); return; }
            if (!label || !amt || !pack) { showToast("All fields required", "error"); return; }

            try {
                const id = 'cp_' + Date.now();
                const newPlan = { id, label, amount: amt, packValue: pack };
                const currentPlans = state.customPlans;
                currentPlans[freq].push(newPlan);

                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'custom_settings');
                await setDoc(docRef, { plans: currentPlans }, { merge: true });
                
                document.getElementById('customPlanModal').classList.add('hidden');

                                <button type="button" onclick="window.setTransType('out')" class="flex-1 py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all ${state.currentTransType === 'out' ? 'bg-white text-ajo-brown shadow-xl' : 'text-zinc-400'}"><i data-lucide="arrow-up-right" size="14" class="inline mr-2"></i> Pay-Out</button>
                            </div>
                            ${renderField('Transaction Amount (₦)', 'tAmt', 'number', true, isEdit ? state.editingTransaction.amount : '')}
                            <div class="space-y-2">
                                <label class="text-[9px] font-black uppercase text-zinc-400 tracking-widest ml-4">Target Plan</label>
                                <select id="tPlanSelect" class="w-full bg-ajo-cream/50 rounded-2xl px-6 py-5 text-[10px] font-black uppercase tracking-widest outline-none focus:bg-white transition-all shadow-inner" required>
                                    <option value="">Select Plan...</option>
                                    ${cPlans.map(p => `<option value="${p.id}" ${isEdit && state.editingTransaction.planId === p.id ? 'selected' : ''}>${p.label}</option>`).join('')}
                                </select>
                            </div>
                            <div class="border-4 border-dashed border-zinc-100 rounded-[3rem] p-12 text-center group hover:border-ajo-brown/20 transition-all bg-zinc-50/50 relative overflow-hidden">
                                <input type="file" id="tProof" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                                <i data-lucide="file-text" class="mx-auto text-zinc-200 group-hover:text-ajo-brown mb-6 transition-colors" size="48"></i>
                                <p class="text-[10px] font-black uppercase text-zinc-400 tracking-[0.25em]">${isEdit ? 'Update Slip (Optional)' : 'Upload Slip (Required)'}</p>
                                <p class="text-[8px] text-zinc-400 uppercase font-black mt-2">Max Size: 1MB</p>
                            </div>
                            <button type="submit" class="w-full py-7 bg-ajo-black text-white rounded-[2.5rem] font-black uppercase text-xs tracking-widest shadow-2xl hover:bg-ajo-brown transition-all">${isEdit ? 'Update Ledger Record' : 'Commit to Ledger'}</button>
                        </form>
                    </div>
                </div>
            `;
        }

        function renderMemberSummary() {
            const c = state.currentClient;
            const t = state.transactions.filter(x => x.clientId === c.id);
            const bal = t.reduce((acc, x) => acc + (x.type === 'in' ? Number(x.amount) : -Number(x.amount)), 0);
            return `<div class="space-y-16 animate-in fade-in duration-500"><div class="bg-ajo-black p-12 md:p-20 rounded-[4rem] text-white relative overflow-hidden shadow-2xl"><div class="absolute -top-20 -right-20 w-80 h-80 bg-ajo-brown/10 rounded-full blur-[100px]"></div><p class="text-ajo-brown font-black uppercase text-[10px] mb-6 tracking-[0.5em]">Consolidated Balance</p><h3 class="text-6xl md:text-8xl font-black mb-12 tracking-tighter">₦${bal.toLocaleString()}</h3><div class="flex flex-wrap gap-4"><div class="px-6 py-3 bg-white/10 rounded-2xl text-[10px] font-black uppercase tracking-widest border border-white/5 font-mono">LEDGER: ${c.displayId}</div><div class="px-6 py-3 bg-ajo-brown rounded-2xl text-[10px] font-black uppercase tracking-widest">${(c.plans || []).length} Active Cycles</div></div></div><div class="space-y-10"><div class="flex items-center gap-4"><div class="w-2 h-8 bg-ajo-brown rounded-full"></div><h3 class="font-black uppercase text-[10px] tracking-[0.3em] text-ajo-black">Savings Portfolio</h3></div><div class="grid gap-10">${['daily', 'weekly', 'monthly'].map(catId => { const plans = [...THRIFT_PLANS[catId], ...state.customPlans[catId]].filter(p => (c.plans || []).includes(p.id)); if (plans.length === 0) return ''; return `<div class="bg-white rounded-[3rem] border border-zinc-100 shadow-sm overflow-hidden"><div class="p-8 border-b bg-zinc-50/50 flex justify-between items-center"><h4 class="font-black text-[10px] uppercase tracking-widest text-zinc-400">${catId} Series</h4></div><div class="overflow-x-auto"><table class="w-full text-left text-xs whitespace-nowrap"><thead class="bg-zinc-50 text-[9px] font-black uppercase border-b tracking-widest"><tr><th class="px-10 py-6">Target Plan</th><th class="px-10 py-6 text-center">Progress</th><th class="px-10 py-6 text-right">Value</th></tr></thead><tbody class="divide-y divide-zinc-50">${plans.map(p => { const pT = state.transactions.filter(t => t.clientId === c.id && t.planId === p.id); const pVal = pT.reduce((acc, t) => acc + (t.type === 'in' ? Number(t.amount) : -Number(t.amount)), 0); const progress = Math.min((pVal / p.packValue) * 100, 100); return `<tr class="hover:bg-ajo-cream/10 transition-colors"><td class="px-10 py-8 font-black text-ajo-black text-sm tracking-tight">${p.label}</td><td class="px-10 py-8"><div class="flex items-center justify-center gap-4"><div class="w-40 bg-zinc-100 h-2 rounded-full overflow-hidden shadow-inner"><div class="bg-ajo-brown h-full transition-all duration-1000" style="width: ${progress}%"></div></div><span class="text-[10px] font-black text-zinc-400">${Math.round(progress)}%</span></div></td><td class="px-10 py-8 text-right font-black text-sm tracking-tighter text-ajo-black">₦${pVal.toLocaleString()}</td></tr>`; }).join('')}</tbody></table></div></div>`; }).join('')}</div></div></div>`;
        }

        function renderMemberProfile() {
            const c = state.currentClient;
            return `
                <div class="max-w-4xl mx-auto space-y-12 animate-in slide-in-from-bottom-10 duration-500">
                    <form id="memberProfileUpdateForm" class="bg-white rounded-[4rem] border border-zinc-100 p-12 lg:p-20 shadow-2xl space-y-12">
                        <div class="flex flex-col md:flex-row justify-between items-start gap-8 border-b border-zinc-50 pb-12">
                            <div>
                                <h2 class="text-4xl font-black text-ajo-black tracking-tighter uppercase mb-2">Member Identity</h2>
                                <p class="text-[10px] font-black uppercase tracking-[0.4em] text-ajo-brown italic">Profile Management</p>
                            </div>
                            <div class="px-8 py-3 bg-ajo-black text-white rounded-2xl text-[10px] font-black uppercase tracking-[0.3em] font-mono">${c.displayId}</div>
                        </div>

                        <div class="grid md:grid-cols-2 gap-x-16 gap-y-10 text-sm">
                            <div class="md:col-span-2 p-8 bg-zinc-50 rounded-[2.5rem] grid md:grid-cols-2 gap-8">
                                ${renderReadOnlyItem('Legal Name', `${c.firstName} ${c.lastName}`)}
                                ${renderReadOnlyItem('Email Account', c.email)}
                                ${renderReadOnlyItem('Payout Bank', c.bankName)}
                                ${renderReadOnlyItem('Account Number', c.accountNumber)}
                                <div class="md:col-span-2">
                                    ${renderReadOnlyItem('Account Holder', c.accountName)}
                                </div>
                                <p class="md:col-span-2 text-[8px] font-bold text-zinc-400 uppercase tracking-widest italic">Bank details and email are locked for security. Contact admin for corrections.</p>
                            </div>

                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase text-zinc-400 tracking-widest ml-1">Phone</label>
                                <input type="text" id="mPhone" value="${c.phone}" class="w-full bg-ajo-cream/30 rounded-xl px-5 py-4 font-bold border border-transparent focus:border-ajo-brown/30 outline-none transition-all">
                            </div>
                            ${renderPasswordField('Access Password', 'mPass', c.password)}
                            <div class="md:col-span-2">${renderReadOnlyItem('Primary Residence', c.address)}</div>
                        </div>
                        <div class="pt-6">
                            <button type="submit" class="w-full py-6 bg-ajo-black text-white rounded-3xl font-black uppercase tracking-[0.2em] text-[10px] shadow-xl hover:bg-ajo-brown transition-all">Save Profile Changes</button>
                        </div>
                    </form>
                </div>`;
        }

        function renderReadOnlyItem(l, v) { return `<div><p class="text-[10px] font-black uppercase text-zinc-300 tracking-widest mb-2">${l}</p><p class="text-sm font-black text-ajo-black uppercase tracking-tight opacity-70">${v}</p></div>`; }

        function renderLedger(transactions, isClient = false) {
            const sorted = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));
            const isAdmin = state.view === 'admin-dash';
            const allPlans = [...THRIFT_PLANS.daily, ...THRIFT_PLANS.weekly, ...THRIFT_PLANS.monthly, ...state.customPlans.daily, ...state.customPlans.weekly, ...state.customPlans.monthly];
            
            return `
                <div class="space-y-10 animate-in fade-in duration-500">
                    <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-6 px-4">
                        <div>
                            <h2 class="text-3xl font-black uppercase tracking-tighter text-ajo-black">Digital Ledger</h2>
                            <p class="text-[10px] font-black uppercase text-zinc-400 tracking-[0.4em] mt-1">${sorted.length} Total Entries</p>
                        </div>
                        <div class="flex flex-wrap gap-3">
                            <button onclick="window.exportLedgerPDF()" class="px-5 py-3 bg-white border border-zinc-200 rounded-xl text-[9px] font-black uppercase tracking-widest flex items-center gap-2 hover:bg-ajo-black hover:text-white transition-all shadow-sm">
                                <i data-lucide="file-text" size="14"></i> PDF Export
                            </button>
                            <button onclick="window.exportLedgerCSV()" class="px-5 py-3 bg-white border border-zinc-200 rounded-xl text-[9px] font-black uppercase tracking-widest flex items-center gap-2 hover:bg-ajo-black hover:text-white transition-all shadow-sm">
                                <i data-lucide="table" size="14"></i> CSV Export
                            </button>
                        </div>
                    </div>
                    <div class="bg-white rounded-[3rem] border border-zinc-100 shadow-sm overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-xs whitespace-nowrap">
                                <thead class="bg-zinc-50 text-[9px] font-black uppercase border-b tracking-[0.3em]">
                                    <tr>
                                        <th class="px-10 py-6">Timestamp</th>
                                        ${!isClient ? '<th class="px-10 py-6">Member & Plan</th>' : '<th class="px-10 py-6">Target Plan</th>'}
                                        <th class="px-10 py-6">Action</th>
                                        <th class="px-10 py-6 text-center">Slip</th>
                                        <th class="px-10 py-6 text-right">Value (₦)</th>
                                        ${isAdmin ? '<th class="px-10 py-6 text-right">Controls</th>' : ''}
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-zinc-50">
                                    ${sorted.map(t => {
                                        const planLabel = allPlans.find(p => p.id === t.planId)?.label || 'Other/Misc';
                                        return `
                                        <tr class="hover:bg-zinc-50 transition-colors">
                                            <td class="px-10 py-8 text-zinc-400 font-bold">
                                                <div class="text-ajo-black font-mono">${new Date(t.date).toLocaleDateString()}</div>
                                                <div class="text-[8px] uppercase mt-1">${new Date(t.date).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                                            </td>
                                            <td class="px-10 py-8 font-black text-ajo-black uppercase tracking-tight">
                                                ${!isClient ? `
                                                    <div class="text-ajo-black">${t.clientName}</div>
                                                    <div class="text-[8px] text-zinc-400 mt-1 font-bold italic">${planLabel}</div>
                                                ` : `<span class="text-[10px] text-zinc-500">${planLabel}</span>`}
                                            </td>
                                            <td class="px-10 py-8">
                                                <span class="px-4 py-1.5 rounded-lg font-black uppercase text-[9px] tracking-widest ${t.type === 'in' ? 'bg-green-100 text-green-700' : 'bg-ajo-brown/10 text-ajo-brown'}">${t.type === 'in' ? 'Deposit' : 'Withdrawal'}</span>
                                            </td>
                                            <td class="px-10 py-8 text-center">
                                                ${t.proofUrl ? `<button onclick="window.viewProof('${t.proofUrl}')" class="text-ajo-brown hover:scale-125 transition-transform"><i data-lucide="eye" size="18"></i></button>` : `<span class="text-zinc-200">--</span>`}
                                            </td>
                                            <td class="px-10 py-8 text-right font-black text-base ${t.type === 'in' ? 'text-green-700' : 'text-ajo-black'}">₦${Number(t.amount).toLocaleString()}</td>
                                            ${isAdmin ? `
                                                <td class="px-10 py-8 text-right flex items-center justify-end gap-3">
                                                    <button onclick="window.editTransaction('${t.id}')" class="p-2.5 bg-zinc-100 text-zinc-400 rounded-xl hover:bg-ajo-black hover:text-white transition-all"><i data-lucide="edit" size="16"></i></button>
                                                    <button onclick="window.deleteTransaction('${t.id}')" class="p-2.5 bg-red-50 text-red-400 rounded-xl hover:bg-red-500 hover:text-white transition-all"><i data-lucide="trash-2" size="16"></i></button>
                                                </td>
                                            ` : ''}
                                        </tr>
                                    `}).join('')}
                                    ${sorted.length === 0 ? `<tr><td colspan="${isClient ? 5 : 6}" class="px-10 py-20 text-center text-[10px] font-black text-zinc-300 uppercase tracking-widest">No entries found</td></tr>` : ''}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderSuccessModal() {
            return `
                <div class="fixed inset-0 z-[100] flex items-center justify-center p-6 modal-blur animate-in fade-in duration-300">
                    <div class="bg-white rounded-[4rem] p-12 lg:p-20 max-w-xl w-full text-center shadow-2xl animate-in zoom-in duration-500">
                        <div class="w-20 h-20 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-10"><i data-lucide="check-circle" class="text-green-500" size="40"></i></div>
                        <h3 class="text-3xl font-black text-ajo-black mb-6 uppercase tracking-tighter">Authorized</h3>
                        <p class="text-zinc-500 text-sm leading-relaxed mb-12">Your savings portfolio has been initialized. Please check credentials sent to your email.</p>
                        <button onclick="window.navigate('client-login')" class="w-full py-6 bg-ajo-black text-white rounded-3xl font-black uppercase tracking-widest text-[10px] shadow-xl hover:bg-ajo-brown transition-all">Proceed to Login</button>
                    </div>
                </div>
            `;
        }

        function attachDomEvents() {
            const forms = ['clientLoginForm', 'adminLoginForm', 'signupForm', 'createMemberForm', 'editMemberForm', 'transactionEntryForm', 'memberProfileUpdateForm', 'adminSettingsForm'];
            forms.forEach(formId => {
                const el = document.getElementById(formId);
                if (el) el.onsubmit = (e) => handleFormSubmit(e, formId);
            });
            const searchInput = document.getElementById('clientSearchInput');
            if (searchInput) {
                searchInput.oninput = (e) => {
                    state.clientsSearch = e.target.value; render();
                    const input = document.getElementById('clientSearchInput');
                    if (input) { input.focus(); input.setSelectionRange(input.value.length, input.value.length); }
                };
            }
        }

        async function handleFormSubmit(e, formId) {
            e.preventDefault(); if (state.isProcessing) return; state.isProcessing = true;
            try {
                if (formId === 'adminLoginForm') {
                    const pass = document.getElementById('authPass').value;
                    if (pass === state.adminCreds) { 
                        const sessionRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'session', 'current');
                        await setDoc(sessionRef, { type: 'admin', lastActive: new Date().toISOString() });
                        state.view = 'admin-dash'; showToast('Admin authorized'); 
                    } else { state.error = 'Invalid credentials'; }
                }
                if (formId === 'clientLoginForm') {
                    const id = document.getElementById('authId').value.trim().toUpperCase();
                    const pass = document.getElementById('authPass').value;
                    const found = state.clients.find(c => c.displayId === id && c.password === pass);
                    if (found) { 
                        const sessionRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'session', 'current');
                        await setDoc(sessionRef, { type: 'client', clientId: found.id, lastActive: new Date().toISOString() });
                        state.currentClient = found; state.view = 'client-dash'; showToast('Welcome back'); 
                    } else { state.error = 'Invalid ID or password'; }
                }
                if (formId === 'signupForm') {
                    const emailValue = document.getElementById('sEmail').value.trim().toLowerCase();
                    if (state.clients.some(c => c.email.toLowerCase() === emailValue)) throw new Error("Email exists.");
                    const pass = document.getElementById('sPass').value;
                    if (pass !== document.getElementById('sPassConfirm').value) throw new Error('Passwords mismatch');
                    validatePasswordPolicy(pass);
                    
                    const clientData = { 
                        firstName: document.getElementById('sFirst').value, 
                        lastName: document.getElementById('sLast').value, 
                        email: emailValue, 
                        phone: document.getElementById('sPhone').value, 
                        password: pass, 
                        address: document.getElementById('sAddr').value, 
                        bankName: document.getElementById('sBankName').value,
                        accountNumber: document.getElementById('sAccNum').value,
                        accountName: document.getElementById('sAccName').value,
                        segments: Array.from(document.querySelectorAll('input[name="sSegments"]:checked')).map(el => el.value), 
                        plans: Array.from(document.querySelectorAll('input[name="sPlans"]:checked')).map(el => el.value), 
                        displayId: generateNextMemberId(), 
                        dateCreated: new Date().toISOString() 
                    };
                    
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), clientData);
                    await triggerEmails('signup', clientData);
                    
                    state.lastSignupId = clientData.email; 
                    state.showSignupSuccess = true;
                    state.error = '';
                }
                if (formId === 'createMemberForm') {
                    const emailValue = document.getElementById('cEmail').value.trim().toLowerCase();
                    const pass = document.getElementById('cPass').value; validatePasswordPolicy(pass);
                    const clientData = { 
                        firstName: document.getElementById('cFirst').value, 
                        lastName: document.getElementById('cLast').value, 
                        email: emailValue, 
                        phone: document.getElementById('cPhone').value, 
                        address: document.getElementById('cAddr').value, 
                        bankName: document.getElementById('cBankName').value,
                        accountNumber: document.getElementById('cAccNum').value,
                        accountName: document.getElementById('cAccName').value,
                        segments: Array.from(document.querySelectorAll('input[name="cSegments"]:checked')).map(el => el.value), 
                        plans: Array.from(document.querySelectorAll('input[name="cPlans"]:checked')).map(el => el.value), 
                        displayId: generateNextMemberId(), 
                        password: pass, 
                        dateCreated: new Date().toISOString() 
                    };
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), clientData);
                    await triggerEmails('signup', clientData); showToast('Enrolled'); state.adminActiveView = 'clients';
                }
                if (formId === 'editMemberForm') {
                    const pass = document.getElementById('cPass').value; validatePasswordPolicy(pass);
                    const updatedData = { 
                        ...state.editingClient, 
                        firstName: document.getElementById('cFirst').value, 
                        lastName: document.getElementById('cLast').value, 
                        email: document.getElementById('cEmail').value, 
                        phone: document.getElementById('cPhone').value, 
                        address: document.getElementById('cAddr').value, 
                        bankName: document.getElementById('cBankName').value,
                        accountNumber: document.getElementById('cAccNum').value,
                        accountName: document.getElementById('cAccName').value,
                        segments: Array.from(document.querySelectorAll('input[name="cSegments"]:checked')).map(el => el.value), 
                        plans: Array.from(document.querySelectorAll('input[name="cPlans"]:checked')).map(el => el.value), 
                        password: pass 
                    };
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'clients', state.editingClient.id), updatedData);
                    
                    if (pass !== state.editingClient.password) {
                        await triggerEmails('password_change', updatedData);
                    }
                    
                    showToast('Updated'); state.editingClient = null; state.adminActiveView = 'clients';
                }
                if (formId === 'memberProfileUpdateForm') {
                    const newPass = document.getElementById('mPass').value; validatePasswordPolicy(newPass);
                    const oldPass = state.currentClient.password;
                    
                    const updatePayload = { 
                        phone: document.getElementById('mPhone').value, 
                        password: newPass 
                    };
                    
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'clients', state.currentClient.id), updatePayload);
                    
                    if (newPass !== oldPass) {
                        await triggerEmails('password_change', state.currentClient);
                    }
                    
                    showToast('Profile Updated');
                }
                if (formId === 'adminSettingsForm') {
                    if (document.getElementById('aCurrentPass').value !== state.adminCreds) throw new Error("Incorrect current key.");
                    const newP = document.getElementById('aNewPass').value; validatePasswordPolicy(newP);
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'admin_access'), { password: newP, updatedAt: new Date().toISOString() });
                    showToast("Key updated."); state.adminActiveView = 'dashboard';
                }
                if (formId === 'transactionEntryForm') {
                    const client = state.selectedClientForTrans;
                    const fileInput = document.getElementById('tProof');
                    const isEdit = !!state.editingTransaction;
                    let proofUrl = isEdit ? state.editingTransaction.proofUrl : null;

                    // SECURITY CHECK: 1MB LIMIT
                    const MAX_SIZE = 1 * 1024 * 1024; // 1MB in bytes

                    if (fileInput.files.length > 0) {
                        const file = fileInput.files[0];
                        
                        if (file.size > MAX_SIZE) {
                            throw new Error("File size exceeds 1MB limit. Please compress the image.");
                        }

                        const reader = new FileReader();
                        proofUrl = await new Promise(res => {
                            reader.onload = e => res(e.target.result);
                            reader.readAsDataURL(file);
                        });
                    } else if (!isEdit) {
                        throw new Error("Proof slip required.");
                    }

                    const transData = { 
                        clientId: client.id, 
                        clientName: `${client.firstName} ${client.lastName}`, 
                        amount: document.getElementById('tAmt').value, 
                        planId: document.getElementById('tPlanSelect').value, 
                        type: state.currentTransType, 
                        proofUrl, 
                        date: isEdit ? state.editingTransaction.date : new Date().toISOString(),
                        lastUpdated: new Date().toISOString()
                    };

                    if (isEdit) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'transactions', state.editingTransaction.id), transData);
                        await triggerEmails('edit_transaction', { client, amount: transData.amount, type: state.currentTransType });
                        showToast('Record updated');
                    } else {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'transactions'), transData);
                        await triggerEmails('transaction', { client, amount: transData.amount, type: state.currentTransType });
                        showToast('Logged to ledger');
                    }
                    state.editingTransaction = null;
                    state.adminActiveView = 'history';
                }
                render();
            } catch (err) { console.error(err); showToast(err.message, 'error'); } 
            finally { state.isProcessing = false; render(); }
        }

        window.onload = initApp;
    </script>
</body>
</html>
