    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        :root {
            --ajo-black: #0F0F0F;
            --ajo-brown: #8B5E3C;
            --ajo-brown-dark: #4A2E19;
            --ajo-cream: #F5F2F0;
            --ajo-bg: #FAFAF9;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            scroll-behavior: smooth; 
            background-color: var(--ajo-bg); 
            color: #1a1a1a;
        }

        .bg-ajo-black { background-color: var(--ajo-black); }
        .bg-ajo-brown { background-color: var(--ajo-brown); } 
        .text-ajo-brown { color: var(--ajo-brown); }
        .border-ajo-brown { border-color: var(--ajo-brown); }
        .bg-ajo-brown-dark { background-color: var(--ajo-brown-dark); } 
        .bg-ajo-cream { background-color: var(--ajo-cream); }
        
        [v-cloak] { display: none; }
        
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d1d1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--ajo-brown); }
        
        .gradient-text {
            background: linear-gradient(135deg, #8B5E3C 0%, #4A2E19 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .premium-shadow {
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05), 0 10px 20px -10px rgba(139, 94, 60, 0.1);
        }

        .sidebar-transition { 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), width 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .modal-blur {
            backdrop-filter: blur(12px);
            background-color: rgba(15, 15, 15, 0.7);
        }

        input:focus, select:focus, textarea:focus {
            outline: 2px solid var(--ajo-brown);
            outline-offset: -2px;
        }

        /* Animations */
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up { animation: slideUp 0.5s ease-out forwards; }
        
        .toast-enter { transform: translateY(100%); opacity: 0; }
        .toast-active { transform: translateY(0); opacity: 1; transition: all 0.3s ease; }
    </style>
</head>

        // --- HELPER FUNCTIONS ---
        window.showToast = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            const bg = type === 'success' ? 'bg-ajo-black text-white' : 'bg-red-600 text-white';
            const icon = type === 'success' ? 'check-circle' : 'alert-circle';
            
            toast.className = `px-6 py-4 rounded-2xl ${bg} shadow-2xl flex items-center gap-4 animate-slide-up min-w-[300px] border border-white/10`;
            toast.innerHTML = `<i data-lucide="${icon}" size="18"></i><span class="text-xs font-bold uppercase tracking-widest">${message}</span>`;
            
            container.appendChild(toast);
            lucide.createIcons();
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px)';
                setTimeout(() => toast.remove(), 400);
            }, 3500);
        };

            state.mobileSidebarOpen = false;
            state.landingMenuOpen = false;

            state.view = 'landing';
            state.currentClient = null;
            state.mobileSidebarOpen = false;
            showToast('Logged out successfully');
            render();
        };

        window.setTransType = (type) => {
            state.currentTransType = type;
            render();
        };

        // --- CORE LOGIC ---
        async function initApp() {
            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);

                // Handle Auth securely for both Canvas and External Hosting (GitHub)
                const customToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
                
                try {
                    if (customToken) {
                        // Attempt environment token login
                        await signInWithCustomToken(auth, customToken);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (authErr) {
                    // Fallback to anonymous if token mismatches (Common with custom Firebase keys)
                    console.warn("Auth token mismatch, falling back to anonymous login.");
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    state.user = user;
                    if (user) setupRealtimeListeners();
                    render();
                });

                emailjs.init(EMAILJS_PUBLIC_KEY);
            } catch (err) {
                console.error("Critical Connection Error:", err);
                // Clear loading screen even on error to show state.error
                state.view = 'landing';
                state.error = "Ledger Connection Failed. Please check your network.";
                render();
            }
        }

        function setupRealtimeListeners() {
            if (!state.user) return;

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), (snap) => {
                state.clients = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            }, (err) => {
                console.error("Clients Sync Error:", err);
                if (err.code === 'permission-denied') {
                    showToast("Access Restricted: Check security rules.", "error");
                }
            });

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'transactions'), (snap) => {
                state.transactions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            }, (err) => console.error("Transactions Sync Error:", err));
        }

        async function triggerEmails(type, data) {
            try {
                if (type === 'signup') {
                    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_SIGNUP_TEMPLATE, {
                        client_id: data.displayId,
                        to_email: data.email,
                        to_name: data.firstName
                    });
                } else if (type === 'transaction') {
                    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TRANS_TEMPLATE, {
                        name: data.client.firstName,
                        transaction_type: data.type === 'in' ? 'Deposit' : 'Withdrawal',
                        amount: `₦${Number(data.amount).toLocaleString()}`,
                        to_email: data.client.email
                    });
                }
            } catch (e) {
                console.error("Email notification failed", e);
            }
        }

            const root = document.getElementById('app');

            let content = '';

            switch (state.view) {

                case 'signup': content = renderSignup(); break;
                case 'admin-login': content = renderAuthForm('admin'); break;
                case 'client-login': content = renderAuthForm('client'); break;
                case 'admin-dash': content = renderDashboard('admin'); break;
                case 'client-dash': content = renderDashboard('client'); break;
            }

            if (state.showSignupSuccess) content += renderSuccessModal();

            root.innerHTML = content;
            lucide.createIcons();
            attachDomEvents();
        }

                            <p class="text-[9px] font-black text-zinc-400 uppercase tracking-widest mt-2">Authorization Required</p>
                        </div>
                        <form id="${type}LoginForm" class="space-y-6">

                        </form>
                        <button onclick="window.navigate('landing')" class="w-full mt-8 text-zinc-400 text-[10px] uppercase font-black tracking-widest hover:text-ajo-black transition-colors">Return Home</button>
                    </div>
                </div>
            `;

        function renderSignup() {
            return `
                <div class="min-h-screen bg-ajo-cream py-16 px-6">
                    <form id="signupForm" class="max-w-3xl mx-auto bg-white rounded-[3rem] p-10 md:p-16 shadow-2xl border border-ajo-brown/5 space-y-12 animate-in zoom-in duration-300">
                        <div class="text-center space-y-3">
                            <h2 class="text-3xl font-black text-ajo-black tracking-tighter uppercase">Join Femi Ajo</h2>
                            <p class="text-[10px] font-black text-zinc-400 uppercase tracking-widest">Initialize your member portfolio</p>
                        </div>
                        
                        <div class="grid sm:grid-cols-2 gap-8">
                            ${renderField('First Name', 'sFirst', 'text', true)}
                            ${renderField('Last Name', 'sLast', 'text', true)}
                            ${renderField('Email Address', 'sEmail', 'email', true)}
                            ${renderField('Phone Number', 'sPhone', 'tel', true)}
                        </div>
                        
                        ${renderField('Residential Address', 'sAddr', 'text', true)}

                        <div class="space-y-6">
                            <p class="text-[10px] font-black uppercase tracking-[0.3em] text-ajo-brown border-b pb-4">Classification</p>
                            <div class="flex flex-wrap gap-3">
                                ${SEGMENTS.map(s => `
                                    <label class="flex items-center gap-3 px-6 py-4 border border-zinc-100 rounded-2xl cursor-pointer hover:bg-ajo-cream transition-all has-[:checked]:bg-ajo-black has-[:checked]:text-white">
                                        <input type="checkbox" name="sSegments" value="${s}" class="hidden">
                                        <span class="text-[10px] font-black uppercase tracking-widest">${s}</span>
                                    </label>
                                `).join('')}
                            </div>
                        </div>

                        <div class="space-y-10">
                            <p class="text-[10px] font-black uppercase tracking-[0.3em] text-ajo-brown border-b pb-4">Select Savings Plan(s)</p>
                            ${['daily', 'weekly', 'monthly'].map(cat => `
                                <div class="space-y-4">
                                    <h4 class="text-[9px] font-black text-zinc-400 uppercase tracking-widest">${cat} options</h4>
                                    <div class="grid sm:grid-cols-2 gap-3">
                                        ${THRIFT_PLANS[cat].map(p => `
                                            <label class="flex items-center gap-4 p-5 border border-zinc-50 rounded-2xl cursor-pointer hover:bg-zinc-50 transition-all has-[:checked]:bg-ajo-cream/40">
                                                <input type="checkbox" name="sPlans" value="${p.id}" class="w-5 h-5 accent-ajo-brown">
                                                <span class="text-[11px] font-bold text-ajo-black">${p.label}</span>
                                            </label>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <div class="pt-8 space-y-4">
                            <button type="submit" class="w-full py-6 bg-ajo-black text-white rounded-[2.5rem] font-black uppercase tracking-widest text-[10px] shadow-2xl hover:bg-ajo-brown transition-all">Submit Enrollment</button>
                            <button type="button" onclick="window.navigate('landing')" class="w-full text-zinc-400 text-[10px] font-black uppercase tracking-widest hover:text-red-500 transition-colors">Cancel Application</button>
                        </div>
                    </form>
                </div>
            `;
        }

        function renderField(label, id, type, req = false, val = '') {
            return `
                <div class="space-y-2">
                    <label class="text-[9px] font-black uppercase text-zinc-400 tracking-widest ml-4">${label}</label>
                    <input type="${type}" id="${id}" value="${val}" class="w-full bg-ajo-cream/50 rounded-2xl px-6 py-4 text-sm font-bold border-transparent focus:bg-white transition-all shadow-inner" ${req ? 'required' : ''}>
                </div>
            `;
        }

        function renderDashboard(type) {
            const isAdmin = type === 'admin';
            const activeView = isAdmin ? state.adminActiveView : state.clientActiveView;
            const currentObj = isAdmin ? { firstName: 'System', lastName: 'Admin' } : state.currentClient;

            return `
                <div class="flex h-screen overflow-hidden bg-white">
                    <aside class="sidebar-transition fixed lg:relative z-50 bg-ajo-black text-white h-screen flex flex-col shadow-2xl ${state.mobileSidebarOpen ? 'translate-x-0 w-64' : '-translate-x-full lg:translate-x-0 w-64'}">
                        <div class="p-8 flex items-center gap-4 border-b border-white/5 mb-6">
                            <div class="w-10 h-10 bg-ajo-brown rounded-xl flex items-center justify-center font-black shadow-lg">F</div>
                            <span class="font-black text-sm uppercase tracking-tighter">Femi Ajo</span>
                            <button onclick="window.toggleMobileSidebar()" class="lg:hidden ml-auto text-zinc-600"><i data-lucide="x"></i></button>
                        </div>
                        <nav class="flex-1 px-4 space-y-2">
                            ${isAdmin ? `
                                ${renderNavItem('layout-dashboard', 'Summary', activeView === 'dashboard', 'navigateAdmin', 'dashboard')}
                                ${renderNavItem('users', 'Members', activeView === 'clients', 'navigateAdmin', 'clients')}
                                ${renderNavItem('plus-circle', 'Register', activeView === 'create', 'navigateAdmin', 'create')}
                                ${renderNavItem('book-open', 'Full Ledger', activeView === 'history', 'navigateAdmin', 'history')}
                            ` : `
                                ${renderNavItem('layout-dashboard', 'Portfolio', activeView === 'dashboard', 'navigateClient', 'dashboard')}
                                ${renderNavItem('user-circle', 'Identity', activeView === 'profile', 'navigateClient', 'profile')}
                                ${renderNavItem('history', 'Timeline', activeView === 'history', 'navigateClient', 'history')}
                            `}
                        </nav>
                        <div class="p-6 border-t border-white/5">
                            <button onclick="window.handleLogout()" class="w-full py-4 bg-zinc-900 text-zinc-500 rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-red-900/20 hover:text-red-400 transition-all">
                                <i data-lucide="log-out" size="14"></i> Logout
                            </button>
                        </div>
                    </aside>

                    <main class="flex-1 overflow-y-auto w-full relative bg-zinc-50">
                        <header class="sticky top-0 bg-white/80 backdrop-blur-xl border-b border-zinc-100 px-6 lg:px-12 py-4 flex justify-between items-center z-40">
                            <div class="flex items-center gap-4">
                                <button onclick="window.toggleMobileSidebar()" class="lg:hidden p-3 bg-ajo-cream rounded-xl text-ajo-brown"><i data-lucide="menu" size="20"></i></button>
                                <div>
                                    <h1 class="text-[9px] font-black uppercase text-zinc-400 tracking-widest">${isAdmin ? 'Administrator' : 'Member ID: ' + currentObj.displayId}</h1>
                                    <p class="text-sm font-black text-ajo-black tracking-tighter uppercase">${currentObj.firstName} ${currentObj.lastName}</p>
                                </div>
                            </div>
                            <div class="w-12 h-12 rounded-2xl bg-ajo-black flex items-center justify-center text-white font-black text-xs shadow-xl ring-4 ring-ajo-cream">${currentObj.firstName[0]}${currentObj.lastName[0] || ''}</div>
                        </header>
                        <div class="p-6 lg:p-12">
                            ${renderDashboardView(isAdmin, activeView)}
                        </div>
                    </main>
                </div>
            `;
        }

        function renderNavItem(icon, label, active, func, arg) {
            const isActive = active ? 'bg-ajo-brown text-white shadow-xl' : 'text-zinc-500 hover:bg-zinc-900 hover:text-white';
            return `<button onclick="window.${func}('${arg}')" class="w-full flex items-center gap-4 px-6 py-4 rounded-2xl transition-all ${isActive}"><i data-lucide="${icon}" size="18" class="shrink-0"></i><span class="font-black text-[10px] uppercase tracking-[0.2em]">${label}</span></button>`;
        }

        function renderDashboardView(isAdmin, view) {
            if (isAdmin) {
                switch (view) {
                    case 'dashboard': return renderAdminSummary();
                    case 'clients': return renderAdminMemberDirectory();
                    case 'create': return renderAdminMemberForm();
                    case 'history': return renderLedger(state.transactions);
                    case 'transaction': return renderTransactionPanel();
                    case 'edit': return renderAdminMemberForm(true);
                    default: return '';
                }
            } else {
                switch (view) {
                    case 'dashboard': return renderMemberSummary();
                    case 'profile': return renderMemberProfile();
                    case 'history': return renderLedger(state.transactions.filter(t => t.clientId === state.currentClient.id), true);
                    default: return '';
                }
            }
        }

        function renderAdminSummary() {
            const tIn = state.transactions.filter(x => x.type === 'in').reduce((a, b) => a + Number(b.amount), 0);
            const tOut = state.transactions.filter(x => x.type === 'out').reduce((a, b) => a + Number(b.amount), 0);
            
            return `
                <div class="space-y-12 animate-in fade-in duration-500">
                    <div class="grid sm:grid-cols-3 gap-6">
                        ${renderStatCard('Portfolios', state.clients.length, 'users', 'Members')}
                        ${renderStatCard('Total Inflow', '₦' + tIn.toLocaleString(), 'arrow-down-left', 'Deposits', 'text-green-600')}
                        ${renderStatCard('Total Outflow', '₦' + tOut.toLocaleString(), 'arrow-up-right', 'Payouts', 'text-ajo-brown')}
                    </div>
                    
                    <div class="bg-white rounded-[3rem] border border-zinc-100 shadow-sm overflow-hidden">
                        <div class="p-8 border-b flex justify-between items-center bg-zinc-50/50">
                            <h2 class="font-black text-[10px] uppercase tracking-widest text-zinc-400">Recent Enrollments</h2>
                            <button onclick="window.navigateAdmin('clients')" class="text-[9px] text-ajo-brown font-black uppercase hover:underline">Manage All</button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-xs whitespace-nowrap">
                                <thead class="bg-zinc-50 text-[9px] font-black uppercase border-b tracking-widest">
                                    <tr>
                                        <th class="px-10 py-6">Identity</th>
                                        <th class="px-10 py-6">Member Name</th>
                                        <th class="px-10 py-6 text-right">Action</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-zinc-50">
                                    ${state.clients.slice(-5).reverse().map(c => `
                                        <tr class="hover:bg-ajo-cream/10 transition-colors">
                                            <td class="px-10 py-6 font-mono font-bold text-ajo-brown">${c.displayId}</td>
                                            <td class="px-10 py-6 font-black uppercase tracking-tight text-ajo-black">${c.firstName} ${c.lastName}</td>
                                            <td class="px-10 py-6 text-right">
                                                <button onclick="window.recordFor('${c.id}')" class="bg-ajo-brown/10 text-ajo-brown font-black text-[9px] uppercase px-5 py-2.5 rounded-xl hover:bg-ajo-brown hover:text-white transition-all">Record Entry</button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        window.recordFor = (id) => {
            state.selectedClientForTrans = state.clients.find(c => c.id === id);
            state.adminActiveView = 'transaction';
            render();
        };

        window.editMember = (id) => {
            state.editingClient = state.clients.find(c => c.id === id);
            state.adminActiveView = 'edit';
            render();
        };

        function renderStatCard(l, v, i, s, c = '') {
            return `
                <div class="bg-white p-10 rounded-[3rem] border border-zinc-100 shadow-sm flex items-start gap-6 hover:shadow-xl transition-all">
                    <div class="w-14 h-14 bg-ajo-cream rounded-2xl flex items-center justify-center text-ajo-brown shrink-0 shadow-inner">
                        <i data-lucide="${i}" size="24"></i>
                    </div>
                    <div>
                        <p class="text-zinc-400 font-black uppercase text-[8px] mb-2 tracking-[0.3em]">${l}</p>
                        <h4 class="text-2xl font-black ${c} tracking-tighter">${v}</h4>
                        <p class="text-[10px] font-bold text-zinc-400 mt-2 uppercase tracking-widest">${s}</p>
                    </div>
                </div>
            `;
        }

        function renderAdminMemberDirectory() {
            return `
                <div class="space-y-12 animate-in fade-in duration-500">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                        <div>
                            <h2 class="text-3xl font-black tracking-tighter uppercase text-ajo-black">Member Registry</h2>
                            <p class="text-[10px] font-black text-zinc-400 uppercase tracking-widest mt-2">Database Management</p>
                        </div>
                        <div class="relative w-full md:w-96">
                            <i data-lucide="search" class="absolute left-6 top-1/2 -translate-y-1/2 text-zinc-400" size="18"></i>
                            <input type="text" id="clientSearchInput" value="${state.clientsSearch}" placeholder="SEARCH BY NAME OR ID..." 
                                class="w-full bg-white border border-zinc-100 rounded-full pl-16 pr-8 py-5 text-[10px] font-black uppercase tracking-widest outline-none focus:ring-4 focus:ring-ajo-brown/5 shadow-sm">
                        </div>
                    </div>
                    
                    ${['daily', 'weekly', 'monthly'].map(cat => renderDirectoryCategory(cat)).join('')}
                </div>
            `;
        }

        function renderDirectoryCategory(catId) {
            const filtered = state.clients.filter(c => {
                const hasPlan = (c.plans || []).some(pId => THRIFT_PLANS[catId].some(p => p.id === pId));
                const matchSearch = !state.clientsSearch || 
                    `${c.firstName} ${c.lastName}`.toLowerCase().includes(state.clientsSearch.toLowerCase()) || 
                    c.displayId.toLowerCase().includes(state.clientsSearch.toLowerCase());
                return hasPlan && matchSearch;
            });

            if (filtered.length === 0 && state.clientsSearch) return '';

            return `
                <div class="space-y-6">
                    <div class="flex items-center gap-4 px-4">
                        <div class="w-2 h-8 bg-ajo-brown rounded-full"></div>
                        <h3 class="font-black uppercase text-[10px] tracking-[0.3em] text-ajo-black">${catId} Active Records (${filtered.length})</h3>
                    </div>
                    <div class="bg-white rounded-[3rem] border border-zinc-100 shadow-sm overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-xs whitespace-nowrap">
                                <thead class="bg-zinc-50 text-[9px] font-black uppercase border-b tracking-[0.25em]">
                                    <tr>
                                        <th class="px-10 py-6">ID Portfolio</th>
                                        <th class="px-10 py-6">Member Info</th>
                                        <th class="px-10 py-6 text-center">Net Saved</th>
                                        <th class="px-10 py-6 text-right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-zinc-50">
                                    ${filtered.map(c => {
                                        const cTrans = state.transactions.filter(t => t.clientId === c.id);
                                        const bal = cTrans.reduce((acc, t) => acc + (t.type === 'in' ? Number(t.amount) : -Number(t.amount)), 0);
                                        return `
                                            <tr class="hover:bg-ajo-cream/10 transition-colors">
                                                <td class="px-10 py-6 font-mono font-bold text-ajo-brown text-sm tracking-widest">${c.displayId}</td>
                                                <td class="px-10 py-6">
                                                    <div class="font-black text-ajo-black uppercase tracking-tight text-sm">${c.firstName} ${c.lastName}</div>
                                                    <div class="text-[9px] text-zinc-400 uppercase mt-1 font-black tracking-widest">${c.segments?.join(' | ') || 'No Segment'}</div>
                                                </td>
                                                <td class="px-10 py-6 text-center font-black text-green-700 text-sm">₦${bal.toLocaleString()}</td>
                                                <td class="px-10 py-6 text-right flex items-center justify-end gap-3">
                                                    <button onclick="window.recordFor('${c.id}')" class="p-3.5 bg-ajo-brown/10 text-ajo-brown rounded-2xl hover:bg-ajo-brown hover:text-white transition-all"><i data-lucide="plus" size="18"></i></button>
                                                    <button onclick="window.editMember('${c.id}')" class="p-3.5 bg-zinc-100 text-zinc-400 rounded-2xl hover:bg-ajo-black hover:text-white transition-all"><i data-lucide="settings" size="18"></i></button>
                                                </td>
                                            </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAdminMemberForm(isEdit = false) {
            const data = isEdit ? state.editingClient : { firstName: '', lastName: '', email: '', phone: '', address: '', plans: [], segments: [] };
            return `
                <div class="max-w-4xl mx-auto">
                    <form id="${isEdit ? 'editMemberForm' : 'createMemberForm'}" class="bg-white p-12 lg:p-20 rounded-[4rem] border border-zinc-100 shadow-2xl space-y-16 animate-in slide-in-from-bottom-10 duration-500">
                        <div class="text-center space-y-4">
                            <h2 class="text-3xl font-black tracking-tighter text-ajo-black uppercase">${isEdit ? 'Update Member Profile' : 'Direct Member Enrollment'}</h2>
                            <p class="text-[9px] font-black text-zinc-400 uppercase tracking-widest">Internal Ledger Authorization</p>
                        </div>
                        
                        <div class="grid md:grid-cols-2 gap-8">
                            ${renderField('First Name', 'cFirst', 'text', true, data.firstName)}
                            ${renderField('Last Name', 'cLast', 'text', true, data.lastName)}
                            ${renderField('Member Phone', 'cPhone', 'text', true, data.phone)}
                            ${renderField('Email Address', 'cEmail', 'email', true, data.email)}
                        </div>
                        ${renderField('Primary Address', 'cAddr', 'text', true, data.address)}

                        <div class="space-y-8">
                            <p class="text-[10px] font-black uppercase tracking-[0.4em] text-ajo-brown border-b pb-6">Member Classification</p>
                            <div class="flex flex-wrap gap-4">
                                ${SEGMENTS.map(s => `
                                    <label class="flex items-center gap-4 px-8 py-5 border border-zinc-100 rounded-3xl cursor-pointer hover:bg-ajo-cream transition-all has-[:checked]:bg-ajo-black has-[:checked]:text-white">
                                        <input type="checkbox" name="cSegments" value="${s}" class="w-5 h-5 accent-ajo-brown" ${(data.segments || []).includes(s) ? 'checked' : ''}>
                                        <span class="text-[10px] font-black tracking-widest uppercase">${s}</span>
                                    </label>
                                `).join('')}
                            </div>
                        </div>

                        <div class="space-y-12">
                            <p class="text-[10px] font-black uppercase tracking-[0.4em] text-ajo-brown border-b pb-6">Assigned Savings Plans</p>
                            ${['daily', 'weekly', 'monthly'].map(cat => `
                                <div class="space-y-6">
                                    <h4 class="text-[9px] font-black uppercase text-zinc-400 ml-4 tracking-[0.2em]">${cat} Series</h4>
                                    <div class="grid gap-3">
                                        ${THRIFT_PLANS[cat].map(p => `
                                            <label class="flex items-center gap-6 p-6 border border-zinc-50 rounded-3xl cursor-pointer hover:bg-zinc-50 transition-all has-[:checked]:bg-ajo-cream/30">
                                                <input type="checkbox" name="cPlans" value="${p.id}" class="w-6 h-6 accent-ajo-brown" ${(data.plans || []).includes(p.id) ? 'checked' : ''}>
                                                <span class="text-sm font-bold text-ajo-black tracking-tight">${p.label}</span>
                                            </label>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <div class="pt-10 flex flex-col gap-4">
                            <button type="submit" class="w-full py-7 bg-ajo-black text-white rounded-[2.5rem] font-black uppercase tracking-widest text-xs shadow-2xl hover:bg-ajo-brown transition-all">
                                ${isEdit ? 'Update Master Portfolio' : 'Authorize New Membership'}
                            </button>
                            ${isEdit ? `
                                <button type="button" onclick="window.navigateAdmin('clients')" class="w-full text-zinc-400 text-[10px] font-black uppercase tracking-widest hover:text-ajo-black">Cancel Changes</button>
                            ` : ''}
                        </div>
                    </form>
                </div>
            `;
        }

        function renderTransactionPanel() {
            const c = state.selectedClientForTrans;
            if (!c) return '';
            const cPlans = [...THRIFT_PLANS.daily, ...THRIFT_PLANS.weekly, ...THRIFT_PLANS.monthly].filter(p => (c.plans || []).includes(p.id));
            
            return `
                <div class="max-w-2xl mx-auto">
                    <div class="bg-white p-12 lg:p-20 rounded-[4rem] shadow-2xl border border-zinc-100 relative animate-in zoom-in duration-500">
                        <button onclick="window.navigateAdmin('clients')" class="absolute top-12 right-12 text-zinc-300 hover:text-ajo-black transition-colors"><i data-lucide="x" size="24"></i></button>
                        
                        <div class="text-center mb-16 space-y-4">
                            <h2 class="text-3xl font-black tracking-tighter uppercase text-ajo-black">Ledger Transaction</h2>
                            <div class="inline-block px-5 py-2 bg-ajo-cream rounded-full text-ajo-brown font-mono font-bold text-[10px] tracking-widest">${c.displayId} | ${c.firstName} ${c.lastName}</div>
                        </div>

                        <form id="transactionEntryForm" class="space-y-10">
                            <div class="flex bg-ajo-cream/50 p-2 rounded-3xl shadow-inner">
                                <button type="button" onclick="window.setTransType('in')" 
                                    class="flex-1 py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all ${state.currentTransType === 'in' ? 'bg-white text-green-700 shadow-xl' : 'text-zinc-400'}">
                                    <i data-lucide="arrow-down-left" size="14" class="inline mr-2"></i> Pay-In
                                </button>
                                <button type="button" onclick="window.setTransType('out')" 
                                    class="flex-1 py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all ${state.currentTransType === 'out' ? 'bg-white text-ajo-brown shadow-xl' : 'text-zinc-400'}">
                                    <i data-lucide="arrow-up-right" size="14" class="inline mr-2"></i> Pay-Out
                                </button>
                            </div>

                            ${renderField('Transaction Amount (₦)', 'tAmt', 'number', true)}

                            <div class="space-y-2">
                                <label class="text-[9px] font-black uppercase text-zinc-400 tracking-widest ml-4">Target Plan</label>
                                <select id="tPlanSelect" class="w-full bg-ajo-cream/50 rounded-2xl px-6 py-5 text-[10px] font-black uppercase tracking-widest outline-none focus:bg-white transition-all shadow-inner" required>
                                    <option value="">Select Plan...</option>
                                    ${cPlans.map(p => `<option value="${p.id}">${p.label}</option>`).join('')}
                                </select>
                            </div>

                            <div class="border-4 border-dashed border-zinc-100 rounded-[3rem] p-12 text-center group hover:border-ajo-brown/20 transition-all bg-zinc-50/50">
                                <i data-lucide="file-text" class="mx-auto text-zinc-200 group-hover:text-ajo-brown mb-6 transition-colors" size="48"></i>
                                <p class="text-[10px] font-black uppercase text-zinc-400 tracking-[0.25em]">Upload Proof of Payment</p>
                                <p class="text-[8px] text-zinc-300 mt-2 uppercase">(Optional Digital Copy)</p>
                            </div>

                            <button type="submit" class="w-full py-7 bg-ajo-black text-white rounded-[2.5rem] font-black uppercase text-xs tracking-widest shadow-2xl hover:bg-ajo-brown transition-all">Commit to Ledger</button>
                        </form>
                    </div>
                </div>
            `;
        }

        function renderMemberSummary() {
            const c = state.currentClient;
            const t = state.transactions.filter(x => x.clientId === c.id);
            const bal = t.reduce((acc, x) => acc + (x.type === 'in' ? Number(x.amount) : -Number(x.amount)), 0);
            
            return `
                <div class="space-y-16 animate-in fade-in duration-500">
                    <div class="bg-ajo-black p-12 md:p-20 rounded-[4rem] text-white relative overflow-hidden shadow-2xl">
                        <div class="absolute -top-20 -right-20 w-80 h-80 bg-ajo-brown/10 rounded-full blur-[100px]"></div>
                        <p class="text-ajo-brown font-black uppercase text-[10px] mb-6 tracking-[0.5em]">Consolidated Net Savings</p>
                        <h3 class="text-6xl md:text-8xl font-black mb-12 tracking-tighter">₦${bal.toLocaleString()}</h3>
                        <div class="flex flex-wrap gap-4">
                            <div class="px-6 py-3 bg-white/10 rounded-2xl text-[10px] font-black uppercase tracking-widest border border-white/5 font-mono">FAJ LEDGER: ${c.displayId}</div>
                            <div class="px-6 py-3 bg-ajo-brown rounded-2xl text-[10px] font-black uppercase tracking-widest">${(c.plans || []).length} Active Cycles</div>
                        </div>
                    </div>

                    <div class="space-y-10">
                        <div class="flex items-center gap-4">
                            <div class="w-2 h-8 bg-ajo-brown rounded-full"></div>
                            <h3 class="font-black uppercase text-[10px] tracking-[0.3em] text-ajo-black">My Savings Portfolio</h3>
                        </div>
                        <div class="grid gap-10">
                            ${['daily', 'weekly', 'monthly'].map(catId => {
                                const plans = THRIFT_PLANS[catId].filter(p => (c.plans || []).includes(p.id));
                                if (plans.length === 0) return '';
                                return `
                                    <div class="bg-white rounded-[3rem] border border-zinc-100 shadow-sm overflow-hidden">
                                        <div class="p-8 border-b bg-zinc-50/50 flex justify-between items-center">
                                            <h4 class="font-black text-[10px] uppercase tracking-widest text-zinc-400">${catId} Series</h4>
                                        </div>
                                        <div class="overflow-x-auto">
                                            <table class="w-full text-left text-xs whitespace-nowrap">
                                                <thead class="bg-zinc-50 text-[9px] font-black uppercase border-b tracking-widest">
                                                    <tr>
                                                        <th class="px-10 py-6">Target Plan</th>
                                                        <th class="px-10 py-6 text-center">Lifecycle Progress</th>
                                                        <th class="px-10 py-6 text-right">Plan Value</th>
                                                    </tr>
                                                </thead>
                                                <tbody class="divide-y divide-zinc-50">
                                                    ${plans.map(p => {
                                                        const pT = state.transactions.filter(t => t.clientId === c.id && t.planId === p.id);
                                                        const pVal = pT.reduce((acc, t) => acc + (t.type === 'in' ? Number(t.amount) : -Number(t.amount)), 0);
                                                        const progress = Math.min((pVal / p.packValue) * 100, 100);
                                                        return `
                                                            <tr class="hover:bg-ajo-cream/10 transition-colors">
                                                                <td class="px-10 py-8 font-black text-ajo-black text-sm tracking-tight">${p.label}</td>
                                                                <td class="px-10 py-8">
                                                                    <div class="flex items-center justify-center gap-4">
                                                                        <div class="w-40 bg-zinc-100 h-2 rounded-full overflow-hidden shadow-inner">
                                                                            <div class="bg-ajo-brown h-full transition-all duration-1000" style="width: ${progress}%"></div>
                                                                        </div>
                                                                        <span class="text-[10px] font-black text-zinc-400 tracking-tighter">${Math.round(progress)}%</span>
                                                                    </div>
                                                                </td>
                                                                <td class="px-10 py-8 text-right font-black text-sm tracking-tighter text-ajo-black uppercase">₦${pVal.toLocaleString()}</td>
                                                            </tr>
                                                        `;
                                                    }).join('')}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderMemberProfile() {
            const c = state.currentClient;
            return `
                <div class="max-w-4xl mx-auto space-y-12 animate-in slide-in-from-bottom-10 duration-500">
                    <div class="bg-white rounded-[4rem] border border-zinc-100 p-12 lg:p-20 shadow-2xl">
                        <div class="flex flex-col md:flex-row justify-between items-start gap-8 border-b border-zinc-50 pb-12 mb-12">
                            <div>
                                <h2 class="text-4xl font-black text-ajo-black tracking-tighter uppercase mb-2">Member Identity</h2>
                                <p class="text-[10px] font-black uppercase tracking-[0.4em] text-ajo-brown italic">Verified Enrollment Data</p>
                            </div>
                            <div class="px-8 py-3 bg-ajo-black text-white rounded-2xl text-[10px] font-black uppercase tracking-[0.3em] font-mono">PORTFOLIO: ${c.displayId}</div>
                        </div>

                        <div class="grid md:grid-cols-2 gap-x-16 gap-y-10 text-sm">
                            ${renderProfileItem('Legal Name', `${c.firstName} ${c.lastName}`)}
                            ${renderProfileItem('Email Contact', c.email)}
                            ${renderProfileItem('Mobile Line', c.phone)}
                            ${renderProfileItem('Member Segment', c.segments?.join(', ') || 'General')}
                            <div class="md:col-span-2">
                                ${renderProfileItem('Primary Address', c.address)}
                            </div>
                        </div>

                        <div class="mt-20 p-10 bg-ajo-cream/30 border border-ajo-brown/10 rounded-[3rem] flex flex-col md:flex-row items-center gap-8">
                            <div class="w-16 h-16 bg-white rounded-3xl flex items-center justify-center text-ajo-brown shrink-0 shadow-lg"><i data-lucide="help-circle" size="28"></i></div>
                            <div class="text-center md:text-left">
                                <p class="text-[11px] font-black uppercase tracking-widest text-ajo-black mb-1">Need to update your details?</p>
                                <p class="text-xs text-zinc-500 leading-relaxed">Identity verification is mandatory for profile changes. Please coordinate with the admin team at <a href="mailto:femiajoplace@gmail.com" class="text-ajo-brown font-bold underline hover:text-ajo-brown-dark transition-colors">femiajoplace@gmail.com</a>.</p>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        function renderProfileItem(l, v) {
            return `<div><p class="text-[10px] font-black uppercase text-zinc-300 tracking-widest mb-2">${l}</p><p class="text-sm font-black text-ajo-black uppercase tracking-tight">${v}</p></div>`;
        }

        function renderLedger(transactions, isClient = false) {
            const sorted = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));
            return `
                <div class="space-y-10 animate-in fade-in duration-500">
                    <div class="flex items-center justify-between px-4">
                        <h2 class="text-3xl font-black uppercase tracking-tighter text-ajo-black">Digital Ledger</h2>
                        <span class="text-[10px] font-black uppercase text-zinc-400 tracking-[0.4em]">${sorted.length} Records Found</span>
                    </div>
                    <div class="bg-white rounded-[3rem] border border-zinc-100 shadow-sm overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-xs whitespace-nowrap">
                                <thead class="bg-zinc-50 text-[9px] font-black uppercase border-b tracking-[0.3em]">
                                    <tr>
                                        <th class="px-10 py-6">Timestamp</th>
                                        ${!isClient ? '<th class="px-10 py-6">Member Identity</th>' : ''}
                                        <th class="px-10 py-6">Action Event</th>
                                        <th class="px-10 py-6 text-right">Value (₦)</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-zinc-50">
                                    ${sorted.map(t => `
                                        <tr class="hover:bg-zinc-50 transition-colors">
                                            <td class="px-10 py-8 text-zinc-400 font-bold">
                                                <div class="text-ajo-black">${new Date(t.date).toLocaleDateString()}</div>
                                                <div class="text-[8px] uppercase tracking-widest opacity-60 mt-1">${new Date(t.date).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                                            </td>
                                            ${!isClient ? `<td class="px-10 py-8 font-black text-ajo-black uppercase tracking-tight">${t.clientName}</td>` : ''}
                                            <td class="px-10 py-8">
                                                <span class="px-4 py-1.5 rounded-lg font-black uppercase text-[9px] tracking-widest ${t.type === 'in' ? 'bg-green-100 text-green-700' : 'bg-ajo-brown/10 text-ajo-brown'}">
                                                    ${t.type === 'in' ? 'Deposit Entry' : 'Withdrawal Entry'}
                                                </span>
                                            </td>
                                            <td class="px-10 py-8 text-right font-black text-base ${t.type === 'in' ? 'text-green-700' : 'text-ajo-black'}">₦${Number(t.amount).toLocaleString()}</td>
                                        </tr>
                                    `).join('')}
                                    ${sorted.length === 0 ? `<tr><td colspan="${isClient ? 3 : 4}" class="px-10 py-20 text-center text-[10px] font-black text-zinc-300 uppercase tracking-widest">No ledger entries found</td></tr>` : ''}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderSuccessModal() {
            return `
                <div class="fixed inset-0 z-[100] flex items-center justify-center p-6 modal-blur animate-in fade-in duration-300">
                    <div class="bg-white rounded-[4rem] p-12 lg:p-20 max-w-xl w-full text-center shadow-2xl animate-in zoom-in duration-500">
                        <div class="w-20 h-20 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-10 shadow-inner">
                            <i data-lucide="check-circle" class="text-green-500" size="40"></i>
                        </div>
                        <h3 class="text-3xl font-black text-ajo-black mb-6 uppercase tracking-tighter">Identity Authorized</h3>
                        <p class="text-zinc-500 text-sm leading-relaxed mb-12">
                            Your savings portfolio has been initialized in our secure digital ledger. Please check your email <b>${state.lastSignupId}</b> for your unique member ID and portal access instructions.
                        </p>
                        <button onclick="window.navigate('client-login')" class="w-full py-6 bg-ajo-black text-white rounded-3xl font-black uppercase tracking-widest text-[10px] shadow-2xl hover:bg-ajo-brown transition-all">Proceed to Login</button>
                    </div>
                </div>
            `;
        }

        function attachDomEvents() {
            const forms = ['clientLoginForm', 'adminLoginForm', 'signupForm', 'createMemberForm', 'editMemberForm', 'transactionEntryForm'];
            forms.forEach(formId => {
                const el = document.getElementById(formId);
                if (el) el.onsubmit = (e) => handleFormSubmit(e, formId);
            });

            const searchInput = document.getElementById('clientSearchInput');
            if (searchInput) {
                searchInput.oninput = (e) => {
                    state.clientsSearch = e.target.value;
                    render();
                    const input = document.getElementById('clientSearchInput');
                    if (input) {
                        input.focus();
                        input.setSelectionRange(input.value.length, input.value.length);
                    }
                };
            }
        }

        async function handleFormSubmit(e, formId) {
            e.preventDefault();
            if (state.isProcessing) return;
            state.isProcessing = true;

            try {
                if (formId === 'adminLoginForm') {
                    const pass = document.getElementById('authKey').value;
                    if (pass === 'admin123') {
                        state.view = 'admin-dash';
                        showToast('Admin access authorized');
                    } else {
                        state.error = 'Invalid security key';
                    }
                }

                if (formId === 'clientLoginForm') {
                    const id = document.getElementById('authKey').value.trim().toUpperCase();
                    const found = state.clients.find(c => c.displayId === id);
                    if (found) {
                        state.currentClient = found;
                        state.view = 'client-dash';
                        showToast('Welcome back, ' + found.firstName);
                    } else {
                        state.error = 'Portfolio ID not found';
                    }
                }

                if (formId === 'signupForm') {
                    const plans = Array.from(document.querySelectorAll('input[name="sPlans"]:checked')).map(el => el.value);
                    const segments = Array.from(document.querySelectorAll('input[name="sSegments"]:checked')).map(el => el.value);
                    if (!plans.length) throw new Error('Selection of at least one plan is required');

                    const displayId = `FAJ-${new Date().getFullYear()}-${Math.floor(1000 + Math.random() * 9000)}`;
                    const clientData = {
                        firstName: document.getElementById('sFirst').value,
                        lastName: document.getElementById('sLast').value,
                        email: document.getElementById('sEmail').value,
                        phone: document.getElementById('sPhone').value,
                        address: document.getElementById('sAddr').value,
                        segments, plans, displayId,
                        dateCreated: new Date().toISOString()
                    };

                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), clientData);
                    await triggerEmails('signup', clientData);
                    state.lastSignupId = clientData.email;
                    state.showSignupSuccess = true;
                }

                if (formId === 'createMemberForm') {
                    const plans = Array.from(document.querySelectorAll('input[name="cPlans"]:checked')).map(el => el.value);
                    const segments = Array.from(document.querySelectorAll('input[name="cSegments"]:checked')).map(el => el.value);
                    const displayId = `FAJ-${new Date().getFullYear()}-${Math.floor(1000 + Math.random() * 9000)}`;
                    
                    const clientData = {
                        firstName: document.getElementById('cFirst').value,
                        lastName: document.getElementById('cLast').value,
                        email: document.getElementById('cEmail').value,
                        phone: document.getElementById('cPhone').value,
                        address: document.getElementById('cAddr').value,
                        segments, plans, displayId,
                        dateCreated: new Date().toISOString()
                    };

                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'clients'), clientData);
                    showToast('Member enrollment successful');
                    state.adminActiveView = 'clients';
                }

                if (formId === 'editMemberForm') {
                    const plans = Array.from(document.querySelectorAll('input[name="cPlans"]:checked')).map(el => el.value);
                    const segments = Array.from(document.querySelectorAll('input[name="cSegments"]:checked')).map(el => el.value);
                    const clientRef = doc(db, 'artifacts', appId, 'public', 'data', 'clients', state.editingClient.id);
                    
                    await updateDoc(clientRef, {
                        firstName: document.getElementById('cFirst').value,
                        lastName: document.getElementById('cLast').value,
                        email: document.getElementById('cEmail').value,
                        phone: document.getElementById('cPhone').value,
                        address: document.getElementById('cAddr').value,
                        segments, plans
                    });
                    
                    showToast('Member profile updated');
                    state.editingClient = null;
                    state.adminActiveView = 'clients';
                }

                if (formId === 'transactionEntryForm') {
                    const amt = document.getElementById('tAmt').value;
                    const planId = document.getElementById('tPlanSelect').value;
                    const client = state.selectedClientForTrans;

                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'transactions'), {
                        clientId: client.id,
                        clientName: `${client.firstName} ${client.lastName}`,
                        amount: amt,
                        planId: planId,
                        type: state.currentTransType,
                        date: new Date().toISOString()
                    });

                    await triggerEmails('transaction', { client, amount: amt, type: state.currentTransType });
                    showToast('Transaction logged to ledger');
                    state.adminActiveView = 'history';
                }

                render();
            } catch (err) {
                console.error(err);
                showToast(err.message, 'error');
            } finally {
                state.isProcessing = false;
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
